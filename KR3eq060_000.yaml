front:
  text: 毛序顧亭林先生曰君子之為學以明道也以救時也士生寰中第沾沾於詞章考據內無以明道外無以救時於世何裨焉吾友徐君齡臣幼聰穎性豪俠績學未第旋棄儒而就醫理探靈素學貫岐黃居京二十餘年活人無算去冬豫有事於粵適徐君亦客羊城出所著醫粹精言示豫觀其所作悉動中肯綮不泥乎古人不薄乎古人且能高出乎古人豈變而通之歟直神而明之爾持此以閲世匪特可以醫人更可以醫醫爰綴數語以質世之知徐君者歲在柔兆涒灘春王正月皖江弟毛澤曜南甫拜敘自序竊謂醫書可讀者除漢唐以上之論則可以讀可以不讀也況近世著作家各逞臆見理多隔膜其若非實能有輔翼聖經與治法有益者亦可以不必讀矣然多聞而擇多見而識聖人且云故於精粗參半之書亦不妨取而讀之略其短而取其長是在善用者耳豫究心岐黃二十餘年所讀無慮數十百家所用之法皆取決於古人並因時因證而變通之自無不與古人之意吻合間有疑難怪異之症有古法未經道及者輒澄心凝思按脈切理仍於古法之中而求之慎之又慎確有心得出而問世所幸全活甚多因不揣固陋於臨症之暇僅就管見所及著為是編顏之曰醫粹精言其立意持論大半皆古人所未言而於古人所已言者暨各大家真知卓識之論亦時出入其間以與為發明是否有當豫亦不自知應俟方家再為指正粹精云者豫非自命特自勖勖音讀續勉勵之意也噫天下事不粹不精不可以有言至粹至精則尤不易言醫之一道何獨不然豫既以粹精自勖尤願見是篇者各以粹精共勳庶於聖人已立立人之道默默有合焉是則私心所竊幸也光緒二十一年乙未小陽月奉天齡臣氏徐延柞識於羊城鐵如意軒英啓序近世不苦無醫書而患無醫醫之書醫書者研精碑慮心會神悟而後能明致功奏效之所由來是皆未易幾也顧吾嘗謂讀醫書可以已病讀醫醫之書乃可以不病齡臣徐先生所著醫粹精言以醫發其端而非僅為醫家者言也其於醫世醫國醫身醫心蓋深有所感特於醫焉寄之夫待人之既病從而醫之可以為功可以收名善言醫者獨於醫之未病無以為功無以為名此其效乃始於無形著於無窮今世之病亦多矣瀕於危者亦衆矣安所得無病者與之言醫以相要於不病然病苟不至於不可已則必有未病之一脈以待吾施其治夫審其未病之一脈以救其所既病與就其既病之一脈以求其復而歸於無病此其旨微矣先生善醫者也善言醫者也未識以鄙言為何如酷熱得雨清風暫至爰舉以質之光緒丙申夏五月瀋陽英啓書
