body:
  text: 卷一醫非小道賤役上古聖人則法三才闡明陰陽五行運氣循環之理嘗百草明臟象君臣問辨療人疾苦深體上天生物之仁誠重之也是以醫之為道與宓犧畫卦后稷教稼並重豈曰小道乎哉醫之可以寄死生者亦無殊於託孤寄命之君子豈曰賤役乎哉醫而明亦能及物醫而名亦足動衆士果抱道在躬登仁壽而免夭札正可以佐朝廷康濟斯民之治何肯不自重而區區惟利是圖草營人命甘為技術之流哉吾聞狄梁公功在社稷而有腦後下針鼻端疣落之術范文正公先憂後樂而有不為良相即為良醫之願考周官之於疾醫何等鄭重後世史官列之方技於是學士大夫羞為之以此事委諸市井而此中亦遂無人然儒有君子儒醫豈無君子醫欽為薦紳先生者宜何如作養之顧惜之引之使進於道斯後之學者自接踵而興起矣豈可以小道賤役目之哉病不能不用醫人有病不能不用醫良醫世罕有其平穩有閲歷者尚不乏人然必須於平日先知其本領能否勝任始可以性命相托若不知擇醫任醫所措以致輕者變重重者立危豫是因此而成此集俾醫病兩家皆知其慎重為醫者得是書而可以旁通玩索之病者覽得是書與醫者周旋一問答間便知其賢否而去取不誤耳病從口入古語云禍從口出病從口入故善養德者慎言語以遠害善養生者節飲食以卻病況多殺物命慈氏有戒何曾日食萬錢惜福者不如是也省華筵一席之資養中人數口之命則養生即所以養德矣又有一種嗜茶嗜酒嗜水果嗜甘香餅餌之人好尚之偏病亦隨之口腹之纍明哲之士所不為早慎於微也脾胃與腎元並重人身陰陽雖稟於腎而生生之氣原出於肝膽清陽自左旁而升乃陽升於陰也脾土健運而胃氣始能下行此濁陰從右而降乃陰生於陽也此一升一降實為陰陽旋轉之機樞而與天地同其造化者故天地節序有遷移而人身氣血亦應之虛損之人氣血既虧陰陽運行不能循度動多窒滯故欲培其根本必先利其機樞醫輩不知此理而見病涉虛損者徒用呆補之藥則氣愈郁反增其困或致腹中脹滿大便祕結或致頭暈嘔吐臍腹跳動不思飲食痞塞不通等症此皆由機樞之不利故也然則何以利之乎曰清氣出於肝膽肝膽木也惟喜涼潤而條達故宜疏利勿壅遏也宜柔潤勿克伐也風以揚之雨以潤之木有不欣欣向榮者乎脾為陰土喜香燥而溫暖暖則陽和敷布健運不停胃為陽土喜滋潤而通暢暢則飲食脾氣鼓動而化精微生津液周流濁滓下降濁降清升機樞自利矣若肝陽過升胃氣被逆或脾氣困弱飲食難消皆當隨時審察者故治虛損而不知緩急先後進藥之序者未可與言治也按補偏救弊轉危為安雖在良工之用尤要病者之調護不然功不逮過亦徒勞耳調養須知大病愈後調養之方往往不講而抑知此乃後一段工夫所關者甚巨也即如過飽者曰食復惱怒者曰氣復疲於筋力者曰勞復傷於色欲者曰女勞復載在經書世皆知之尚有時而觸犯此外人所最易忽者猶有三焉不在諸復之條者也雖病之已愈多日而血氣苟不充足犯之隨有釀成終身之患者焉一曰淫欲凡人房事必撮周身之精華以泄氣血未充七日未能來復欲事頻數勢必積損成勞尪羸損壽一曰勞頓或遠行或作苦疲弊筋力當時不覺將來肢體解㑊未老先衰其苦有莫可名者一曰忍飢愈後凡有覺飢必得稍食萬勿強耐過時反不欲食強食亦不能化是飢時既傷於前強食又傷於後中州脾胃敗而肺金損則勞嗽脾胃之病成矣三者人多忽之故不可不謹論天癸非經血天癸者天一之氣也諸傢俱即以精血為解然詳玩本篇謂女子二七天癸至月事以時下男子二八天癸至精氣溢寫瀉是皆天癸在先而後精血繼之分明先至後至各有其義焉得謂天癸即精血精血即天癸本末混淆殊失之矣天癸者天之水乾名也故天癸者言天一之陰氣耳氣化為水因名天癸其在人身是謂元陰亦曰元氣人之未生則此氣蘊於父母是謂先天之元氣第氣之初生真陰甚微及其既盛精血乃旺故女必二七男必二八而後天癸至天癸既至在女子則月事以時下在男子則精氣溢寫瀉蓋必陰氣足而後精氣化耳陰氣陰經譬之雲雨云者陰精之氣也雨者陰氣之精也未有云霧不布而雨雪至者亦未有云霧不濃而雨雪足者然則精生於氣而天癸者其即天一之氣乎可無疑矣質疑録云天癸者天一所生之真水在人身是謂元陰余按甲乙經作天水吳氏諸症辨疑婦人調經論云天癸者天一生水也又按王注任沖流通經血漸盈應時而下天真之氣降與之從事故云天癸也總之天癸者非精非血乃天一之真馬氏直謂陰精殊屬謬解今之醫者並不知為陰精竟以經血目之尤為無識釋瘟瘟疫之瘟與溫病之溫其義不同何以言之疫之行也不論四時而其症每異何必冬傷於寒而春病者與發熱而渴不惡寒者乎考瘟之為名猶疫也肘後方曰其年歲中有癘氣兼挾鬼毒相注名為溫病又曰道術符刻言五溫而所謂闢溫諸方亦闢疫之謂也楊玄操注五十八難曰溫病則是疫癘之病非為春病也此說於經義則乖集韻曰瘟烏昆切疫也據此則瘟之為疫甚徵甚確而天下多熱許仁則既有其言此疫之所以亦名為溫也瘟疫重言猶疫癘重言之例耳論衡命義篇曰人之瘟病而死也先有凶色見於面部並可以徵瘟之為疫但瘟本作溫其從廣者蓋後人所改寫而已又傷寒例所謂更遇溫氣變為溫疫者即對寒疫而言亦是一種病也要之溫之名義不一亦猶傷寒之有謂寒氣所中者有謂邪氣表實者有謂外邪總稱之類學者不知牽混為言者誤矣刀圭陶氏本草序例云刀圭皆十分方寸匕之一准梧桐子大醫心方引範汪方云二麻子為一小豆三小豆為一桐實二十黍粟為一簪頭三簪頭為一刀圭外臺祕要刪繁車前草湯方後云一刀圭者准丸如兩大豆大漢律曆志注云六十四黍為一圭按數說似異而其實大抵同董毅碧里雜存云按晦翁感興詩刀圭一入口白日生羽翰然學者多不知刀圭之義但知為妙藥之名耳同治十三年八月十五日忽悟刀圭二字甚痛快不知古人亦嘗評及此否三月初在琉璃廠百貨攤買得古錯刀一枚京師人謂之長錢其錢形正似今之剃刀其上一環正似圭壁之形中一孔即貫索之處蓋服食家舉刀取藥僅滿其上之圭故謂之刀圭言其少耳刀即錢之別名布也泉也錯也刀也皆錢之類也無年號欸識殆漢物乎又按千金太乙神明丹方後云凡言刀圭者以六粟為一刀圭一說曰三小豆為一刀圭據以上諸說六粟疑是六十粟之訛記性汪訒庵云金正希先生嘗言人之記性皆在腦中凡人外見一物必有一形影留在腦中小兒腦未滿老人腦漸空故皆健忘愚思凡人追憶往事必閉目上瞪而思索之此即凝神於腦之意也出於本草備要辛荑注王惠源醫學原始亦云人之一身五臟藏於身內止為生長之具五官居於身上為知覺之具耳目口鼻聚於首最顯最高便與物接耳目口鼻之所導入最近於腦必以先受其象而覺之而寄之而剖之而存之也故云心之記正記於腦耳黃庭經內景亦言腦為泥丸宮元神居焉是必有本何惑之有余按荷蘭說人之精神在於腦中故人斷頭立死亦與內景之說符矣而五雜俎談薈斷頭而不死者數則此皆人妖耳陰陽夫陰陽之為義大矣哉自其淺言之則氣陽也血陰也自其深言之陽有陽氣而陰亦有陰氣陰氣為無形之氣隨陽氣循行於內外不同於有形之陰血獨行於經脈之中也陰血止謂之陰陰氣謂之為陰亦可謂之為陽砭石南史王僧孺傳全元起欲注素問訪王僧孺以砭石答曰古人以石為針必不用鐵說文有此砭字許慎云以石刺病也東山經云高氏之山多針石郭璞云可以為砥針治癰腫春秋美疢不如惡石服子慎注石砭石也季世無復佳石故以針代之耳余按山海經高氏之山其上多玉其下多針石吳任臣廣注程良孺曰或云金剛鑽即其物也病愈先兆傷寒多日忽覺渾身癮疹發越而癢此乃用藥中病陰陽分別榮衛流行病氣自毛竅中出他病亦然小兒驚風發熱將産亦如是按發癢乃陽氣初回之象非風非血燥也有病久不得寐一旦欲寐別無余病此為陰陽和而將愈之兆有大汗大下之後邪氣已退正氣已復身涼脈微鼾息酣睡此亦吉兆也醫者見之當早為知病乃可以有欲愈之機此由於用藥中肯而不可因其有身癢欲寐之象而妄投以治癢安神等藥此乃將愈之時藥何庸哉醫必讀書臨症說讀書而不臨症不可以為醫臨症而不讀書亦不可以為醫蘇長公有言藥雖進於醫手方多傳於古人故惟讀書多乃能辨症亦惟多讀書始能用方彼之不用古方者非棄古方也非真以古方為不可用也直未嘗見一古方耳善用方者且讀無方之書不執方以治病而方自與病合而方自與古合余持此論以臨人病久矣為此囑學醫者當先讀書而後臨症則自無望洋之嘆世無醫藥說今之世一有病無藥之世也一有病無方之世也一有病無醫之世也徐靈胎嘗云醫非人人可為夫本經靈素上古之書即非蓬心人所易領會而如南陽一派指張仲景下及脈經病源千金外臺之所言則皆隨時隨地尋常習見之病而皆視為鳥篆蟲書不可測識曾不能用其一方一藥尚何醫之足云哉逸病說醫書充棟汗牛有長於此者便偏於彼此其故總由其識見不周而用心則易有遺漏耳即以逸病論之人但知有勞病而不知亦有逸病也況逸病尤為富貴中常有之病也向讀劉河間傷寒直格中列有八邪稽其目曰外有風寒暑濕內有飢飽勞逸乃逸豫安逸所生病與勞相反經云勞者溫之逸者行之行謂使氣運行也則內經本有逸病且有治法乃後人引河間語每作風寒暑濕飢飽勞役夫河間以內外八邪標題即曰八邪當有八病故飽與飢對逸與勞對若作勞役則只有七邪矣此內經所以謂勞則宜以溫養逸則利於運行早將勞與逸截分兩病也張子和云飢飽勞逸人之四氣陳無擇云瘧備三因飢飽勞逸二子並能言之審其病之為逸便須用行濕健脾導滯理氣之法凡人閒暇則病小勞轉健有事則病反卻即病亦若可忘者又有食後反倦臥起反疲者皆逸病也流水不腐戶樞不蠹其故安在華元化曰人體欲得勞動但不當使極耳動則穀氣易消血脈流利病不能生於此可悟王公大人久逸之體待漏待等待漏古之計時器入朝亦若同於風霜勞頓而享上壽者正賴有此小勞以治其逸況每日五更獨得乾坤清氣為多哉煙漏說自張潔古有古方今病不相能之說人遂謂病非古方能治然今人萬病皆古人所已言未聞別有古人不知之病也若今所有煙漏一症則真是今病而為古人所未知即為古人所未言向聞煙客多腸燥往往大便乾結為脾約古之病名而何以有煙漏蓋所稱煙漏者即下利也即滯下也亦即俗所謂痢疾也人於傷寒之下利且以漏底為名況今以腸燥之人而忽有利得不稱為漏乎至一加以漏之名則既名漏自當塞則愈塞而愈漏者何也以其非漏也以其本是滯下故以塞者滯之而更滯也或因傷於飲食或以感夫暑濕或以濕多而成五泄皆足以致滯下其病多見於春夏秋之交煙客病即非煙客亦病特煙客臥多行少其氣更易滯耳或曰然則煙漏一症將何法以治之余曰此必不視為煙客不名之為漏仍從滯下正法以通為止則漏自止人既曰漏亦不定以非漏爭也但須知此漏之必得通而止則正所以治漏亦即所以治煙漏也吾見滯下之以名為漏底而卒至不起者皆害於不為之通故並於此發之又煙漏之所然者如是是當推本於煙為煙客籌調理之法人身臟為陰腑為陽一呼一吸以奉生身及其病也在腑為輕在臟為重一臟受病為輕五臟皆病為重人固罕有一病而涉五臟者有之自煙客始夫人咽喉二竅喉主氣息即氣管也咽主飲食即食管也喉系通於肺呼吸出入下通心脾肝腎為氣息之道路咽系通於胃水穀皆由此入為飲食之道路飲食下咽熟軟生硬皆能容受而停留胃中其精微上輸脾肺其糟粕下入大小腸人之以飲食傷而為病者在腑而不及臟若氣管清淨之地不能容受些子有形之物而惟煙之入也有氣無形隨其人之本氣相為呼吸其呼也上出於心肺其吸也下入於腎肝而位乎其中以司呼吸之出入者則於脾人之有脾也本藉胃中水穀氣以生以化今煙氣徑達脾中較之飲食之入必由胃而後及脾者其行倍速是以煙才入喉頃刻周流充達對時不舉失煙氣之充周猶之過時不食失穀氣之榮養其體倦脾為病也涕肺為病也汗心為病也淚肝為病也腸燥腎為病也至其為引俗作癮必對時而作者脾主信脾之為最先也故五臟俱病而脾尤甚焉平時調理自當以健脾為主兼補兼行旁及四臟昔林文忠公林則徐方深合乎法至於病名煙漏實即滯下則仍是腑病不是臟病不可不治其腑此病真是今病真古人所未知然而藥則仍是古人之藥也不盡瘟病論今夫瘟氣者時令或有不正固亦必有之症也然一時偶有之症非時時常有之症一人間染之疾非人人必染之疾也況京都為首善之區儒醫薈萃之下識見宜皆高超乃無論何人何病診之者概以瘟氣目之即車馬盈門衣冠滿戶都城奉為名醫者亦概以瘟氣論之顧人之稟賦各異豈受病之皆同歟抑或診脈之未審耳試思疏風散火消食導氣等劑治瘟氣者所必需也然有瘟氣者瘟氣因之而霍然無瘟氣者則一被攻伐必元氣因之而頽然矣況受瘟氣之人未有不素弱者即治瘟氣之時尚宜調理其元氣奈何於無瘟氣之人竟敢克伐其元氣余於診視之先察其氣色診視之際求其精詳是瘟氣者固不敢矯同而立異非瘟氣者亦不敢舒己而從人為此謹啓慎身君子於延醫調治之時細加體驗勿為醫藥所誤是則余之厚望也夫用藥機要醫之神良識病而已病之機要虛實而已虛甚者必寒實甚者必熱然常病易理變病難知形衰神憊夭色脈空而知其虛形盛神鼓色澤脈強而知其實不待智者決也至實有羸狀誤補增亟大虛有盛候反既含冤陽狂與陰躁不同蚊跡與發斑有異似非洞燭玄微者未易辨也服藥既得寐一凡治病者服藥既得寐此得效之徵也正以邪居神室臥必不安若藥已對證則一匙入咽群邪頓退盜賊甫去民即得安此其治亂之機判於頃刻藥之效否即此可知其有誤治亂投者反以從亂反以助虐必致煩惱懊憹更增不快智者見機當以此預知之矣用藥須知夫治病最難而用藥尤難目今藥店所賣之藥不依古炮炙只徒顏色好看又真僞雜投好歹不辨即或有精通陰陽之醫方能中病而點名具數之藥不惟無益反覺有損譬之五穀最能養人或腐朽濕蝕則反傷人而藥材亦然故醫者病家藥材宜選擇炮炙要精工二者所關甚大余是以反復叮嚀再三提揭果能方與藥俱盡美盡善則藥到病除醫家病傢俱獲益無窮矣然醫為性命所關易學難精非得高人指示醫中三昧何能瞭然是醫有性命之學能調燮陰陽功補造化斯為上醫余望舉世皆為良醫使天下蒼生盡登春臺何樂如之彼用藥時必須質堅性全者方選入手能人人皆然處處盡是庶辦買藥材之輩壞藥無用選擇自精推其流弊皆由病家慳吝總思價廉不求功倍在辦藥買藥者概以假藥壞藥欺人而病人所服皆是有損之藥又安能起其沉疴哉彼未得高人指示之醫用方用藥故每每誤人而不辨藥之好歹真僞不講究炮炙生熟以人命為兒戲者充滿字內吾願病家莫惜銀錢務求上品好藥而醫家當細心代為選擇賣藥家體貼天良貨真價實不以假藥壞藥欺人庶醫持方以治病病得藥以全愈亦不無小補云爾水弱火弱論一陽虛者多寒非謂外來之寒但陽氣不足則寒生於內也若待既寒則火已敗矣而不知病見虛弱而雖無熱證者便是陽虛之候即當溫補元氣使陽氣漸回則真元自復矣蓋陽虛之候多得之愁憂思慮以傷神或勞逸不節以傷力或色欲過度而氣隨精去或素稟元氣不足而寒涼致傷等證皆陽氣受損之所由也欲補陽氣惟辛甘溫燥之劑為宜萬勿兼清涼寒滑之品以殘此發生之氣如生地芍藥天麥門冬沙參之屬皆非所宜而石斛元參知柏芩連龜膠之類則又切不可用一陰虛者多熱水不濟火而陰虛生熱也此病多得於酒色嗜欲或憤怒邪思流蕩狂勞以動五臟之火而先天元陰不足者尤多此病凡患虛損而多熱多燥不宜熱食者便是陰虛之候欲滋其陰惟宜甘涼醇靜之物凡陰中有火者大忌辛溫如乾薑桂附破故紙白朮蒼朮半夏之屬皆不可輕用即如人參黃耆枸杞當歸杜仲之類是皆陰中有陽亦當酌宜而用之蓋恐陽旺水愈消熱增水益涸耳然陰虛者因其水虧而水虧者又忌寒涼蓋苦劣之流非資補之物其有火盛之甚不得不從清涼者亦當兼壯水之劑相機間用而可止即止亦防其敗斯得資補之大法胞與為懷欲救人而學醫則可欲謀利而學醫則不可我之有疾望醫之救我者何如我之父母妻子有疾望醫之相救者何如易地以觀則利自淡矣利心淡則良心現斯畏心生平時讀書必且研以小心也臨症施治不敢掉以輕心也夫而後以局外之身引而進之局內而痛癢相關矣故醫雖小道而所繫甚重略一舉手人之生死因之可不敬懼乎醫醫說前輩云醫人先當醫醫以一醫而治千萬人不過千萬人計耳救一醫便救千萬人救千萬人便救天下後世無量恆河沙數人耳余所以使學醫者先知醫醫方不致誤人性命可以積陰騭於冥冥中也醫必讀書夫為醫者在讀書讀而不能為醫者有矣未有不讀書而能為醫者也陰虛有二夫人生於陽而根於陰根本衰則人必病根本敗則人必危矣所謂根本者即真陰也人知陰虛惟一而不知陰虛有二如陰中之水虛則病在精血陰中之火虛則病在神氣蓋陽衰則氣去故神志為之昏亂非火虛乎陰虧則形壞故肢體為之廢弛非水虛乎今以神離形壞之症乃不知水火之源而猶以標治鮮不危矣病有奇恆病生於外感內傷人所共知而奇恆之病知之者鮮矣奇恆者異於恆常也俗醫不知奇恆之因見脈和緩而用平易之劑此又何異於毒藥乎余故曰服平和之藥而愈者原不死之病勿藥亦可服平和湯而後成不救者醫之罪也論肝無補法足厥陰肝為風木之臟喜條達而惡抑鬱故經云木鬱則達之是也然肝藏血人夜臥則血歸於肝是肝之所賴以養者血也肝血虛則肝火旺肝火旺者肝氣逆也肝氣逆則氣實為有餘有餘則瀉舉世盡曰伐肝故謂肝無補法不知肝氣有餘不可補補則氣滯而不舒非云血之不可補也肝血不足則為筋攣為角弓為抽搐為爪枯為目眩為頭痛為脅肋痛為少腹痛為疝痛諸症凡此皆肝血不榮也而可以不補平然補肝血又莫如滋腎水水者木之母也母旺則子強是以當滋化源若謂肝無補法見肝之病者盡以伐肝為事愈疏而愈虛病有不可勝言矣故謂肝無補法者以肝氣之不可補而非謂肝血之不可補也痢利二字按古方書中痢利二字通用傷寒論中治利之法有治泄利之方有治滯下利之方有治洞瀉利之方皆統治之曰下利而治之之法有上焦中焦下焦因寒因熱氣分血分之不同學者熟讀靈樞素問傷寒金匱等書自能得其一貫之理焉傷寒痘疹癰毒辨許學士曰能醫傷寒即能醫痘疹能醫痘疹即能醫癰毒蓋能醫傷寒者知表裡陰陽寒熱氣血邪正虛實耳傷寒之邪從外而內痘疹之毒從內而外若夫癰毒有因於風寒暑濕之外襲者有因於喜怒飲食之內傷者是以傷寒痘疹癰毒皆當審其表裡虛實而治之如痘症之表實者當清解其表裡實者即疏利其里血熱者涼血氣逆者理氣邪毒盛者急宜清熱解毒正氣虛者又當兼補其正焉氣虛者補氣血虛者補血表虛者固表裡虛者實里是以治痘有寒熱溫涼之方有攻解補瀉之法蓋瀉者瀉其熱毒補者補其正虛昔錢氏宋錢乙痘方多用清涼謂當清熱解毒為要陳氏宋陳文中專用溫補謂血氣充足而後能化毒成漿此皆偏執一見而不得中正之道者也故為兒醫者當以二氏之方折中其間審其邪正虛實而治之萬無一失矣至於癰毒之症與痘疹無二而治法亦同如陰毒在內而不起發者即痘毒之內陷也根盤收斂而高聳者即痘之界地分明而起脹也膿稠者即痘之漿厚也無膿者即痘毒之不化也能食者即痘毒之盡發於外也不能食者毒氣尚壅滯於內也收口者即痘之結痂也臭爛者即痘之坍爛不收也或解或攻或補或瀉當以治痘之法治之古來瘍醫咸以為痛癢瘡瘍皆屬於火惟以寒涼之藥治之或毒反冰伏而不起者或始終用攻利之藥致正氣虛脫而後成不救者噫為兒醫瘍醫者能潛心於靈素仲景諸書功德無量矣認疫治疫要言認疫之法較諸正傷寒風溫溫熱濕溫暑暍等門迥乎大異者即疫也脈症不必大涼而服大涼之藥似有害而終無害者即疫也脈症可進溫補而投溫補之劑始似安而漸不安者即疫也至於治疫之法總以毒字為提綱憑他如妖似怪自能體會無疑君如不信試觀古今治疫之方何莫非以解毒為主吳又可之早用大黃非解毒乎張路玉之酷喜人中黃而以童便配蔥豉為起手方非解毒乎葉天士之銀花金汁必同用非解毒乎至於犀角黃連生甘草等味十方九用非解毒乎故嘉言喻氏有要言不繁曰上焦如霧升而逐之佐以解毒中焦如漚疏而逐之佐以解毒下焦如瀆決而逐之佐以解毒觀其旨上中下則有升疏決之異而獨於解毒一言疊疊緊接不分彼此豈非反復叮嚀示人以真諦也哉外感內傷醫書論外感內傷莫不以內傷為不足矣然勞倦傷有不足者若飲食則有餘者多所以云內傷者明其不因於外感耳非以外感為實內傷為虛也郁無虛病余按世間郁病最多達發奪泄折皆治郁法也故凡郁無虛症按郁之未成其初甚微可呼吸按導而去之若強補而留之留而不去遂成痼疾此謂病成即難去矣又按養生之與去病本自不同今之醫者動以補劑去病宜乎有害而無效也果子藥豫每觀世啞科舊指小兒科療病至虛不多用參附之屬至盛不多用硝黃之輩特主平穩之劑至其危殆不敢自省然而以此馳名致富者頗多小兒醫痘首善咸推某矣某用藥極平易簡少俗所謂果子藥渠所謂吉凶分數約日不差人以此服之豫曰此自其眼力高耳胸中定耳渠知痘無藥也順不必服逆庸服險症亦只須果子藥可保無後怨倉公傳云秦越人非能生人人自當生者秦越人能使之不死耳此又可為一不必服藥之明徵矣矢醫徐洄溪醫貫砭云熱既入里離表已遠驅出為難故就大便通泄其熱從其近也得汗而經熱從汗解非汗為害而欲法之也便矢而府熱從矢出非矢為難而欲攻之也醫不察此專與糟粕為敵自始至終但知消克瀉下之法求一便矢以畢其能事夭人生命如是者曰矢醫近來輦轂矢醫極多可嘆矣李士材治血近得古今圖書集成於藝術典醫部匯考一門遍讀之中有載李中粹語一條云豫於諸血症之始率以桃仁大黃行血破瘀之劑折其鋭氣而後區別治之雖獲中病然猶不得其所以然也後遇四明今浙江郭縣蘇伊舉論諸家之術伊舉曰吾鄉有善醫者每治失血蓄妄必先以快藥下之或問失血復下虛何以當則曰血既妄行迷失故道若不去蓄利瘀則以妄為常易以御之且去者自去生者自生何虛之有豫聞之愕然曰名言也昔者之疑今釋然矣觀此一條於血症一門當知所變通也俗醫不明此理一見失血不問虛實便用止澀以致當去之瘀血不去淤塞於內即變生諸弱症可不畏哉論治病不出氣血痰鬱人身之病變端無窮其治法則千態萬狀有不可以一例拘者丹溪之治病也總不出乎氣血痰三者三者之中又多兼郁氣用四君子血用四物湯痰用二陳湯郁立越鞠丸以為定法王節齊極言之而庸工學步邯鄲亦遂執此以為醫之能事盡此矣夫丹溪之言不過潔其大綱論之耳若謂氣病治氣血病治血痰病治痰郁病治郁又何難哉外感內傷外感內傷為證治內大關鍵然去其所本無復其所固有兩言可盡之蓋六淫外襲身中氣血日失和平一切外感有餘之症有須汗吐下和之治皆是去其所本無也若七情受傷腑臟有損身中氣血日就虧耗一切內傷不足之症有須滋填培補之治皆是復其所固有也外感挾食凡外感病挾食者頗多當思食為邪裹散其邪則食自下若雜消導於發散中不專達表胃汁液傷復因而陷閉者有之至若風多挾暑濕寒或挾燥火或惱怒或勞倦或房事及肝氣宿瘕諸血症皆外感之病不無有挾者所貴隨症制宜斟酌盡善庶無差誤也氣血痰鬱四論雜症主治四字者氣血痰鬱也丹溪治法氣用四君子湯血用四物湯痰用二陳湯郁用越鞠丸參差互用各盡其妙薛立齊從而廣之氣用補中益氣湯而參以八味丸益氣之源也血或四物湯而參以六味丸壯水之主也痰用二陳湯而兼以六君子湯補脾土以勝濕治痰之本也郁用越鞠丸而兼以逍遙散所謂以一方治木鬱而諸郁皆解也用藥之妙愈見精微以愚論之氣虛者宜四君輩而氣實者則香蘇飲平胃散之類可用也血虛者宜四物輩而血實者則手拈散失笑散之類可用也尋常之痰可用二陳輩而頑痰膠固致生怪症者自非滾痰丸之類不濟也些小之郁可用越鞠逍遙輩而五郁相混以致腹膨腫滿二便不通者自非神佑承氣之類弗濟也大抵尋常治法取其平善病勢堅強必須峻劑以攻之若一味退縮則病不除而不察脈氣不識形情浪施攻擊為害尤烈務在平時將此氣血痰鬱四字反復討論曲盡其情辨明虛實寒熱輕重緩急一毫不爽則臨症灼然而於治療雜症之法思過半矣辨脾胃升降余嘗考治脾胃莫詳於東垣求東垣治脾胃之法莫精幹升降夫升降之法易知而升降之理難明其在經曰脾胃為倉廩之官五味出焉蓋脾主生化其用在於無形其屬土地氣主上騰然後能載物故健行而不息是脾之宜升也明矣胃者水穀之海容受糟粕其主納納則貴下行譬如水之性莫不就下是胃之宜降也又明矣故又曰清氣在下則生飧泄濁氣在上則生䐜脹夫清氣何蓋指脾氣而言不然何以在下則飧泄也其濁氣何蓋指胃氣而言不然何以在上則䐜脹也是非可為脾升胃降之一確證乎由此而推如仲聖所立青龍湯越婢湯等方即謂之升脾之清氣也可其所立三承氣大小承氣湯調胃承氣湯諸方即謂之降胃之濁氣也無不可觸類引伸理原一貫先聖後聖其揆一也考東垣所著補中益氣湯升陽益胃湯各方其論雖詳於治脾略於治胃而其意則一臟一腑升降各有主治顯然不可混者其與先聖之理又何嘗相悖而後先輝映足以發明千古良可師也苟其顛倒錯施俾升降失宜則脾胃傷脾胃傷則出納之機失其常度而後天之生氣已息鮮不夭札生民者已余偶讀東垣書詳究脾胃以辨其升降之理如此論犀角升麻按朱南陽有如無犀角以升麻代之之說以其同於一透也朱二允以此二味升降懸殊為辨余謂尚非確論夫犀角乃清透之品升麻乃升透之味一重於清一重於升其性不同其用自異未嘗聞有異而可代者也若夫風寒壅遏疹點未透者斯為升麻之任而溫邪為病丹斑隱現者又系犀角之司如以升麻為代其肺氣熱者必致喉痛甚增喘逆營分熱者必致吐血輕亦衄宣其誤若此豈可代乎又角生於首故用為透劑二允以為下降之品亦不可不辨余非敢輕議前輩實出婆心之不禁耳故謹論之臟腑長短辨讀難經四十二難有臟腑之長短輕重廣狹受盛之數余竊以為未必然如人輕重長短不齊飲食多寡不一即可類推也即長短尚有以中指屈曲而取中節之罫角以量之論而受盛水穀之升合迥然各異可見吾儕看書要在圓通活潑未可拘泥成說也互相抵觸讀古人書須識其補偏救弊一片苦心互相抵觸即是互相闡發處所貴多讀多看融會貫通由博反約以求理明心得臨症無望洋之苦是已若好為指摘棄瑜録暇殊失欽承前哲之道至矜家祕而執成法頭痛醫頭尋方覓藥一切無方之書置之高閣此又孟浪之流不足與語斯道者矣去宿食按傷食惡食人所共知去宿食則食自進老少同法今之醫者以老人停食不可消止宜補中氣以待其自消此等亂道世反奉為金針誤人不知其幾也譫語辨諺語乃心主神氣內虛言主於心非關於胃胃燥譫語而用承氣湯者乃胃絡不能上通於心胃氣清而脈絡能通於心之義今人不明少陰譫語凡解譫語定屬陽明謂法當下豈理也哉小便辨小便不利諸家解釋俱屬膀胱謂經云膀胱者州都之官津液藏焉氣化則能出矣夫氣化則出者言膀胱津液得太陽陽熱之氣化膀胱之寒水而後能出於皮毛非津液下出之謂也蓋外出者津液也下出者水道也經云三焦者決瀆之官水道出焉是小便注於膀胱而主於三焦傷寒論熱結膀胱則以小便通閉而驗血證其餘小便通閉俱屬三焦陶節庵按節庵所著傷寒六書盡易仲景原方參合後賢治法在後人誠為便用故世之嗜節庵者勝於仲景以節庵為捷徑以仲景為畏途節庵之書行而仲景之書晦如節庵者可謂潔古海藏輩之功臣而在長沙指張仲景實為操莽也本集採節庵之論頗多然不能無遺議者以節庵之功罪不妨互見於世也霍亂張隱菴以霍作藿未知何據吳鶴皋云手揮霍而目瞭亂名曰霍亂余按此屬臆解諸病源候論云霍亂者由人溫涼不調陰陽清濁二氣有相干亂之時其亂在於腸胃之間者因遇飲食而變發則心腹絞痛其有先心痛者則先吐先腹痛者則先利心腹並痛者則吐利併發霍亂言其病揮霍之間便致隙亂也文選文賦紛紛揮霍李善注揮霍疾貌失音有二一曰舌瘖乃中風舌不轉運之類是也一曰喉瘖乃勞嗽失音之類是也蓋舌瘖但舌本不能轉運言語而喉咽音聲則如故也喉瘖但喉中聲嘶而舌本則能轉運言語也唐慧琳藏經音義云瘖者寂然而無聲啞者有聲而無說舌不轉也其療治之法詳於各書中當細閲之鼠瘻吳鶴皋云鼠瘻寒氣陷脈為屢其形如鼠也為病令人寒熱余按靈素寒熱篇云寒熱瘰癧在於頸腋者皆何氣使生岐伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者也張景嶽注云瘰癧者其狀纍然而歷貫上下也故於頸腋之間皆能有之因其形如鼠穴塞其一復穿其一故名之為鼠瘻蓋寒熱之毒留於經脈所以聯絡不止一曰結核連續者為瘰癧形長如蜆蛤者為馬刀朱震亨曰瘰癧不作寒熱者可生稍久轉為潮熱者危是也淮南說山訓貍頭愈鼠瘻雞頭已鼠瘻說文鼠漏創也瘻腫也一曰久創知是二字俱漏瘡之謂蓋其狀纍然未潰者為瘰癧已潰而膿不止者為鼠瘻帶下瘕聚吳鶴皋云帶下白赤帶下也瘕聚氣痛不常之名馬元臺云瘕聚者乃積聚也大奇論曰三陽急為瘕按後世有八瘕者亦因七疝之名而遂有八瘕名目即蛇瘕脂瘕青瘕黃瘕燥瘕血瘕狐瘕鱉瘕是內經無之張志聰云瘕者假血液而時下汁沫聚者氣逆滯而為積聚也高士宗云帶下濕濁下淫也瘕聚血液內瘀也余按赤白帶下昉見於病源而古所謂帶下乃腰帶以下之義疾繫於月經者總稱帶下史記扁鵲為帶下醫金匱有帶下三十六病之目可以見也虞庶注二十九難云瘕者謂假於物形是也臟燥孕婦喜笑怒罵如見鬼神非顛狂也乃臟燥書有明言金匱用甘麥大棗湯真乃神驗余常用此方治男婦室女無端而病如顛如狂者隨手皆應乃知古人制方神奇又知臟燥不僅胎病惜世人誤作顛狂邪祟至使病者不死於病而死於藥死於醫可嘆也故先醫有言學醫先學認證認證亦尤須謹於用藥治吸食洋烟病要法近來人有煙癮治病與無煙癮有別有煙癮者食後即側臥吸烟知其胃腕停食也癮半過口乾而飲茶水旋又側臥吸烟知其胸間停水也愛食水果生冷腹中多濕寒也煙火作熱因燥化痰而傷肺寒食作積夾濕成滯而傷脾滲濕化痰潤燥消積固肺健脾乃治癮者要法扶陽今人只是愛服清涼藥動云我有火病難服辛溫之品後延之醫悉皆趨承附和不言上焦有火即雲中下積熱及至委頓亦不知變遷或遇明眼之醫略啓扶陽之論不覺彼此搖頭左右顧盼不待書方而已有不服之意矣比歲冬初請醇邪脈余用桂枝諸醫皆以為不宜後服至十數劑劑劑皆有桂枝並用附子等連服多日精神飲食安寐俱見起色並覺身體作癢此皆陽氣有回轉之兆俗醫不知偏用滋陰蠻補之味以致藥日投而病愈重不知早為變遷誠可謂下愚不移也生今之世思欲展抱負施桂附尚且難入而針砭灼艾之說更斷乎不能行也經絡近世時醫矢口言經絡部位乃外科治毒要法方脈何藉於此嗟嗟經絡不明何以知陰陽之交接臟腑之遞更疾病情因從何審察夫經絡為識病之要道尚不肯講求焉望其宗主內經研究傷寒識血氣之生始知榮衛之循行陰陽根中根外之理不明神機或出或入之道不識師徒授受惟一明醫指掌藥性歌括以為熟此儘可通行用藥誤人全然不辨或遇明醫搘後扯拽更將時事俗情亂其理談恐露出馬腳惟一周旋承奉彼明理人焉肯作惡只得挽回數言以蓋其誤如此時醫誠為可恥痧症治法今所謂痧疾者乃六淫邪毒猛惡厲氣所傷凡所過之處血氣為之凝滯不行其症或見身痛心腹脹滿絞痛或通身青紫四肢厥冷指甲色如靛青口禁牙關緊閉不能言語或心中忙亂死在旦夕是邪毒內入矣宜瀉其毒或刺尺澤委中足十指必使絡脈貫通氣血流行毒邪自解矣輕者即用刮痧之法隨即服萬病解毒丹即藥肆中所制紫金錠或吐或下或汗出務使經氣流通毒邪亦解或吐瀉不止腹痛肢厥大汗脈微欲絶者宜用白通湯通脈四逆湯四逆湯等以回陽氣以化陰邪庶毒厲之邪漸消若口不開者當從鼻孔中灌之集驗良方有云行路之人路中犯此痧症者不得不用刮痧之法刮後或其人不省者宜用人尿拌土將此土環繞臍中復使同行之人向臍中溺之使中宮濕則氣機轉運血脈流行矣痧症辨嘗考醫籍除聖經賢論外凡諸家之論多首標病名次列症狀繼以方藥若某病因於某邪故現某症全不辨晰敘明未嘗不廢書三嘆如醫方集解之方下所注治某病某病而不道其所以然淺學不辨宜否因而誤人雖自缺究心亦古書有以害之也即如痧證之名起於後世古方書名乾霍亂霍亂者感雜錯邪氣上吐下瀉揮霍瞭亂也其邪閉結欲吐不能欲瀉不得而有暴絶之虞則名於霍亂也如邪留營衛按經穴刮之氣血流行邪從毛孔而泄膚現紅點沙子後世痧症之名所由起也上古治外邪多用針砭今之挑痧放痧亦針砭之意耳若近俗所稱吊腳痧者即古書所謂霍亂轉筋也轉筋入腹者死因邪入臟由肝傳脾木剋土為賊邪肝主筋脾位於腹故轉筋入腹則死治法必辨六氣之因虛實之異非可通套混治每見有名專科治瘀者雖常見效但不明六氣為病之因凡遇頭脹胸悶腹痛等症概指為痧混用辛散開竅破氣破血之藥致氣血傷殘邪仍不解其所以名專科者惟習痧症玉衡大全等書而聖經所論陰陽六氣之理未曾體究但知其病用某方某方治某病若其症其因千變萬化似是而非者則莫能辨也痧脹書始於近代補古未備原有濟世之功惜未詳論六氣之理以明其源但稱為痧而敘證狀多列名目淺學未能細辨每與雜病牽混夫痧者雜症中之一症今名目多於雜症使人目眩而莫知其緒如吳又可之論瘟疫亦不明六氣變化之因混指溫病為瘟疫悖經旨而誤後學余於釋瘟中略已辨之若痧症之因實與瘟疫一類以其邪氣鬱遏故變症尤多卒暴如內經云厲大至民善暴死是也要皆不出六氣與穢惡釀成故夏秋常多冬春較少而一方中病狀相類亦如瘟疫之傳染惟瘟疫由膜原傳變痧症之邪淺深不一皆由鬱閉使然現症不同其為疫邪則同也以六氣錯雜閉郁但開其鬱即為治痧之大法然不識六氣為病之理則必誤將雜病作痧而治虛實不分混投痧藥斯害也已古人著書之心原欲濟世不善讀者多以滋害孟子曰盡信書則不如無書倘不明聖經源流則難免因名昧實之弊操術者不可不察焉豈獨痧症瘟疫而已哉虛祕治法余歷觀古人用通藥率用降氣等藥蓋肺氣不下降則大腸不能傳送又老人虛人津液少大便祕經云澀者滑之又有肝陽虛風上旋血燥便祕以熄風調中助少陰腎藥為治今人學不師古妄意斟酌每至大便祕燥不問虛實即以快藥蕩滌之以陰藥滋補之必致旋祕旋開兼生他病可不慎哉醫藥不可偏執說近時學醫者拘守一家偏執己見殊不知時有寒暑地有燥濕貴賤貧富虛實有別老壯婦兒強弱各異況人之素稟有陰陽之偏勝病之流布有今古之不均或一人之身而寒熱各位病之傳化又首末殊情疾症之所以萬變而不可窮極也是以藥之補瀉溫涼治之擒縱緩急倘舉一而廢百其貽害不可勝道奈何今世醫家往往堅持異說膠柱不移如學劉張朱李四家斷斷然務立門戶最不能無偏故元儒許魯齊論梁寬甫病症書既辨其失曰近世論醫有主河間劉氏者有主易州張氏者張氏用藥依准四時陰陽升降而增損之正內經四氣調神之義醫而不知者妄行也劉氏用藥務在椎陳致新不使少有拂鬱正造化新新不停之義醫而不知者無術也然而主張氏者或未盡張氏之妙則瞑眩之劑終莫敢投至失機後時而不救者多矣主劉氏者或未悉劉氏之蘊則劫效目前陰損正氣遺禍於後日者多矣能用二家之長而無二家之弊則殆庶幾乎真達者之見後學之炯戒若繆仲淳李念莪諸人又謂後世元氣轉薄治當以補養為主出神農本草經疏醫宗必讀而其弊失之畏葸又此間有藉口古方者謂病皆有毒治當以攻伐為主而其弊失之疏暴余早嘗謂素問之敘年壽與今時不異明是人之稟賦固無今古之差則不可言後世專宜補藥唐笠山吳醫匯講有管凝齊古今元氣不甚相遠說其意與余所見者符軒岐之書間及調養仲祖之方不乏救陽而病之屬虛者非填補不能愈則不言治病專在攻伐可謂持正之言矣大抵醫者先入為主偶有屢次得效之藥則僻意傾倒濫用也不顧或張皇其說詫以傳世則自誤誤人其為害又豈可勝道哉學者深懲前轍潛研軒岐仲景之法旁及諸家之所長反復尋討哀以為我用平心靜氣務消除門戶之見每對病者精加甄辨隨其人之臟腑虛實陰陽寒熱按六經之法遵仲景之方設或偶有不合亦必兼以諸大家之論出入其間以意消息治之此權衡在我頭頭是道幸勿拘執偏補偏攻之法隨症施方神而明之變化由人是即醫之能事矣其一家之言何足深信也煩躁同一煩躁也太陽之煩躁用青龍湯陽明之煩躁用白虎湯少陰之煩躁用真武湯故所貴乎分經者知其異尤在知其同也咳嗽凡咳嗽初起多因風寒經云皮毛者肺之合也余每見今人患此症不知解肌遽投六味丸湯若加五味子麥冬之類為禍更烈是閉門逐寇也必變成癆可不慎哉
