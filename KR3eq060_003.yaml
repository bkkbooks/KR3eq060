body:
  text: 卷三外治須知六氣變化之病千頭萬緒不一而足診治之法不僅以一湯方盡之亦當窮其變化而推治之內治之法固不可不用而外治之方亦頗能佐內治之不逮蘭臺軌範云有人專用丹溪摩腰方治形體之病老人虛人極驗或加入倭硫黃人參鹿茸沉香水安息或單用麻油黃蠟為丸如胡桃大烘熱摩腰俟腰熱扎好一丸可用數次若腹中病亦可摩此見外治之法古未嘗不行也又王晉三云喉氣急症舍吹鼻通肺之外治無別法陳修園於鶴膝風症云有雷火針及陳芥子末蔥涕薑汁調塗外治二法不可不知此見外治之法今亦重之又匯參云金沸草散原治傷寒痰嗽或以熏舌脹遂愈此見內治方可移為外治也大凡上焦之病以藥研細末鼻取嚏發散為第一捷法不獨通關急救聞藥也連嚏數十次則腠理自松即解肌也涕淚痰涎並出胸中悶惡亦寬即吐法也蓋一嚏實兼汗吐二法不必服蔥豉湯也前賢治傷寒中風傷風時疫溫症由肺逆傳尤宜取嚏喉風赤眼牙疼等症皆有嗅藥亦使病在上者從上出也其方多以皂角細辛為主藜蘆躑躅花為引隨症加藥如傷風熱頭痛赤眼喉腫牙痛者用羌活防風荊芥川芎白芷薄荷細辛蔓荊子躑躅花雄黃硼砂青黛黃連各一錢生石膏風化硝各二錢鵝不食草二錢殭蠶一錢五分蟬蛻五分皂角一兩研末含水吹鼻含水者但取其氣上行不令藥入喉也毛養生治重傷風單用鵝不食草一味研嗅涕淚出即清爽可與此方相證王好古解利傷寒用藿香藜蘆躑躅花研末嗅鼻此方可代霍香正氣散用亦可合不換金正氣散用如治冬月正傷寒頭痛者以麻黃易藿香亦可中風吐痰用皂角藜蘆明礬嗅鼻或以人參藜蘆並用一取其相反為用一取其攻補兼施也虛人宜之又斟酌活變之法也大頭瘟及時毒焮腫喉痛用延胡索一錢五分川芎一錢藜蘆五分躑躅花二分五釐嗅鼻嚏出膿血痰涎為度時感及濕溫等症用闢瘟散蒼朮五錢細辛三錢大黃貫仲薑厚朴法半夏川芎藿香羌活柴胡前胡生甘草防風白芷荊芥獨活枳殼香附薄荷陳皮神麯炒石菖蒲草蔻仁香薷廣木香丁香雄黃桔梗各一錢硃砂五分皂角二兩研末嗅鼻曾有發熱頭痛惡寒無汗並吐瀉者用此取嚏而汗自出瀉亦止是發散之中即兼升提一法兩用較服升藥尤速外症腸出不收及産婦子宮不收取嚏即收亦是此意凡欲升者均可以嚏法升之也又夏月治濕病者以瓜蒂赤小豆含水嗅鼻清肺金而水自下趨胸中之水或吐或瀉而出小便不通探吐提氣而水自下則知嚏法能上升亦能下降也如不用嗅可用濕紙包藥塞鼻亦同古法喉閉不能下藥者每用窒鼻法得嚏而喉自寬又治魚骨卡喉者用大蒜窒鼻不令透氣其骨自下蓋其氣能達到也故窒鼻亦能得效虛人或參以吸法如治血虛頭痛用熟地煎湯置壺中吸其氣法産婦有用四物煎湯令藥氣滿房吸受法膈冷嗅附子脾寒嗅肉桂即以窒鼻為嗅亦無不可此代內服之一法也吸與內服同但不對即可去之不至於留患耳上焦之病尚有塗頂頂為百會穴此一穴與腿上三里穴背後膏肓穴腳底湧泉穴百病皆治覆額額屬天庭主百病病人黑氣出天庭者凶故急症多用生薑擦天庭治之罨眉心眉心屬肺主咽喉呂祖有一枝梅試法小兒多治此點眼眼主五臟肝病尤宜治此塞耳耳屬肝肺腎又鼻口相通故鼻衄齒衄牙痛及瘧疾者每治耳擦項項為太陽經風門穴天柱穴所屬風常從此入腦又截衄有塗項方及肩又有扎指中指屬心鼻衄分男左女右扎此産婦鼻衄非此不救瘧疾亦有扎指法又大指外側一韭葉許名少商穴治喉症用三稜計刺之即散握掌掌亦屬心心主汗故握藥能發汗治積聚及老人虛寒便祕握藥又能下積中風用萆麻仁半粒搗爛徐掌上攤掌如紙薄掌上置碗以熱水衝入碗中靜坐片時亦能發汗敷手腕大指二指手背微窩處為經渠穴治牙痛久而不愈用蒜泥敷之過夜起一水泡挑破愈並治喉痹塗臂黃疸有塗臂大肉方又內關穴在腕上積三個中指長即是曲澤穴在臂膊彎上三寸是瘧疾治此又曲池穴即臂彎為手三陰所匯之處乃治手經要穴也之法膻中即心口為上焦諸病之所生也凡病皆宜治此其皮最薄易透或連下胃脘穴貼背心前後心相應病多從腧入腧者腧穴也故有擦背法及心背兩面夾貼之法兩處尤為上焦要穴治病握總之處太陽穴則頭痛者所必治也中焦之病以藥切粗末炒香布包敷臍上為第一捷法炒香則氣易透且鼻亦可兼嗅如古方治風寒用蔥薑豉鹽炒熱布包掩臍上治霍亂用炒鹽包置臍上以碗覆之腹痛則止治痢用平胃散炒熱敷臍上冷則易之治瘧用常山飲炒熱敷臍上其發必輕再發再敷數次必愈是也此法無論何病無論何方皆照用昔人治黃疽用百部根放臍上酒和糯米飯蓋之以口中有酒氣為度又有用乾薑白芥子敷臍者以口中辣去之則知由臍而入無異於入口中且藥可逐日變換也又治傷寒食積寒熱不調者用一寒一熱之藥為餅置臍上以尉斗盛炭火尉之或空中指懸空一定距離運之治陰症者用炮薑附子肉桂麝香吳萸末之綿裹放臍上上蓋生薑片以蔥切成碗粗一大束扎好放薑上尉斗尉之或鐵烙烙之蔥爛再易此是加一倍法皆所以逼藥氣入肚也治風痛者敷藥後以桑枝燃火逼之治乳癰者搗蔥敷乳上以瓦罐盛炭火逼之汗出而愈亦是此意畏炭火者用瓦罐盛熱湯或粳火尉之或手摩之皆可治熱症不用火以冷水逼之治寒熱交混者冷熱互尉之此在臨症制宜矣至背後脾腧胃腧有須兼治者又有熏臍蒸臍填臍法太乙熏臍法附子填臍法及布包輪尉等法如脾實者用枳殼陳皮炒尉脾虛者用糯米炒尉能助脾運陰寒症用吳英蛇床子炒尉之類下焦之病以藥或研或炒或隨症而制布包坐於身下為第一捷法如水腫搗蔥一斤坐身下水從小便出小便不通亦然水瀉不止艾一斤坐身下並可敷腳心至膝蓋微火烘腳瀉自止是也一屬前陰一屬後陰凡有病宜從二便治者仿此治疝者用灶心土或淨砂炒過加川椒小茴香末拌勻隔褲坐之並用布袋盛藥夾囊下又是二法婦人癆症有燒熱磚淋藥水布包墊氈片坐法癆多屬肝腎之損故治在下部此又一法則知下部之病無不可坐若內服藥不能達到或恐傷胃氣者或治下須無犯上中者中上病宜釜底抽薪者更以坐為優矣又法臌腫及祕結有煎藥水傾桶中坐熏者即用峻藥如芒硝大黃甘遂黑白醜輕粉之類亦不至大傷元氣又治久痢人虛或血崩脫肛者不敢用升藥用補中益氣湯煎湯坐熏産婦陰脫用四物湯煎湯加龍骨入麻油熏洗皆與坐法一例或瀉或補任用古治婦人本有坐藥但以導為坐不如坐身下者可用大劑或有宜導者不妨兼用蔣示吉云治專人虛人産婦便祕用導最妥此又代內服之一法也再下焦之病有摩腰腰為腎府簡便方用黃蠟麻油為丸如胡桃大摩腰俟腰熱扎之並可摩腹中諸病暖腰法兜肚法又命門火衰治此臍下臍下三寸為下丹田即關元也臍下二寸為氣海一寸為陰交皆肝腎要穴古灸法治陰症每於此回陽如欲用玉桂引火歸元用破故紙納氣歸腎者糝敷臍下最妙膝蓋腿彎皆三陰所匯故陰症及三陰瘧皆敷膝蓋又治陽虛有蔽膝敷法傷寒有熏腿彎法喉症有刺委中穴法治痧亦有之又治魚禽獸骨卡喉者用灰面四兩冷水調敷膝蓋一時之久其骨不知消歸何處豫按亦是引下法但未解其用意録此以俟知者如能推之則用法無窮矣腿肚即三里穴在膝蓋下三寸外旁屬陽明胃經亦是下部要穴而醫治肺病有白芥子貼腿肚引下法腳跟與肺腎俱相通治肺腎宜知此腳趾與手指同灸穴甚多亦有掐法扎法宜參看足心即湧泉穴凡治下部肝腎之病皆宜貼足又引熱下行如衄血吐血水瀉譁口痢赤眼牙痛耳痛喉風口疳等症又假陽症皆宜用附子吳萸川烏等藥敷足心或微火烘之亦有貼大蒜片者又有囊盛川椒踏者浸熱湯者亦有加牛膝蚯蚓泥為導者治孕婦熱症保胎用涼藥敷臍下並井泥塗足心云勝用罩胎飲治陽虛者古有湧泉膏又縮陽有擦足心之法此三法雖分上中下三焦而凡上焦之症下治下焦之症上治中焦之症上下分治或治中而上下相應或三焦並治如治鼻衄者清肺熱並清胃熱與腎熱之類乃子母相通之理也余可類推其法俱不出於此凡古方之有效者視症加減無不可為只須辨症分明耳與袁綺香談醫甲辰客檇李古地名今浙江省嘉興縣一帶與西安袁綺香徵君寓齋較近袁固知醫好服藥餌余初往訪見方書藥碗狼藉几案蓋其修合炮製咸所自為嘗出一方示余曰此亦出名人手因其藥平易又少補益故姑置之余曰君知補字之義乎凡物缺則補譬冠服未損而欲補之使堅厚則反為疵纍矣藥能利人亦能損人若果察其陰陽辨其氣味偶舉一二用之通神豈必以方奇品異為能哉晝長多暇姑述一二經驗之症以醒睡魔曩治繆理望司馬細君經阻年餘腹形漸大嘔不納穀日僅以藕汁飲一二杯已待斃矣延余往診見其弱不勝衣喘不成語按脈左三部細若遊絲而右關獨大知病在厥陰而損及太陰閲前醫立案或言氣聚或曰癥瘕雜投以辛香燥散以至危殆爰以甘緩之劑一進而逆止再進而食增繼以育陰益氣經月而脹滿悉除矣是症初不過液枯氣結木乘中土惟攻伐過甚陰液日涸遂至肝陽莫制陽明受困夫陽土喜柔甘能緩急進甘緩者治肝即所以救胃此一舉兼備法也又癸丑寓鄉有舵工子夏患瘡瘍醫投苦寒之品至秋漸至浮腫繼延幼科更進利導腫勢日甚病及半年僅存一息絶食已二日矣其父上鎮市棺將為待死計或謂余知醫遂踵門求治余鑑其誠往視腫勢已甚面目幾不可辨脈亦無從據按因思病久必虛且多服寒涼脾土益衰而及於腎腎水泛溢三焦停滯水滲皮膚注於肌肉水盈則氣促而欲脫急進獨參湯以助肺氣蓋肺主一身氣化且有金水相生之義也時逆氛未靖鄉間無從覓參乃以仙居術一兩令濃煎徐服盡一器喉間痰聲覺漸退於是疊進六君子湯重用參朮甫半月而腫盡消此二症皆以平淡取效可見方不在奇在用之得當耳袁曰君用法良善未識業受何人法宗何派余曰幼年病弱悉屏經史子集食飽睡余惟以方書消遣其時略能意會逮侍疾椿庭杜門不出者數年因遂搜援群書究心靈素而於切脈調劑之法亦漸貫通此業之所由成也嗣是偶有所得輒筆以記之名曰侍親一得暇當就正也翌日袁過余齋遂以書授厥後屢以醫學問余謂凡人受病雖不離乎寒熱虛實然有虛中實實中虛寒化熱熱化寒之異臨症施治必求其剋制之功與相生之義使之並行不悸乃為善耳至調劑之法不過藉氣味偏勝以圖之如內經咸勝苦苦勝辛之類蓋醫者意也方者法也必讀古而不泥於古採方而不囿於方神明其意於法之中研究其理於意之外斯則化而裁之存乎其人矣袁極稱善病案略陳經曰知犯何逆以法治之不有法何以治逆不能知法何以用法難於法而更難於知也能得知逆之法自不難於治逆之法徒有治逆之法而不得知逆之法則知為妄知法乃妄法也以妄知妄法施之犯逆者不但逆不可治且治之而愈速毋乃以活人之指作殺人之器乎為此兢兢焉求其不妄知不妄法者今就鄙見所及略陳數案不敢云以法治逆遂能獲效也實欲仰質高明教其不及以庶幾活人之指耳以常法治常病常則不必言以奇法治奇病奇則難以言故二者不録只録其不離常法而微寓出奇之意者十有三案質之無纍牘之厭推之又引類而申焉後述各案但注姓而不注名皆以某稱之者蓋因年月未遠若彰明較著未免德色於病家見嗔於同道殊不便也李某初夏時醉飽後入水捕魚是夜發熱頭痛四肢外逆內掣腹中痛極治以救表溫中利濕之劑兩帖頗覺安妥三日後忽變一證仰臥如尸耳聾目直呼之不應口出痰涎既然起舞移時仍復僵臥如是者一晝夜診其脈脈甚平和惟兩尺細滑及詢致病之由無有知者於此三處方而三廢之蓋為不得病因也良久其妻始云昨日伊自服藥或者因此因覓在擊藥渣視之系地黃湯加薄桂也余藉此著想以二陳湯加細辛豆豉投之下咽未及一時病者太息兩目合睫假寐一刻周身微微出汗醒則病霍然矣余擬此證本感寒濕起雖溫表利濕得安徐邪尚未盡撤乘伊妄服六味引入腎陰腎主骨故仰臥如尸陰則躁故時起亂舞腎不寧而子亦病故目直耳聾腎乃胃之關腎有邪胃亦不利故痰涎上吐尺脈帶滑者少陰伏邪之診也是用二陳以通陰陽和胃豁痰加豆豉細辛提劫腎邪胃通邪出所以先太息而後汗解耳此證雖非大逆然不明顛末不察錯妄治法決不如是倘再妄施又不知如何變證也述此一案為粗知藥性妄自調治者鑑並見問之一道醫家切勿模糊強作能人徒誤病證耳樂某初病時其子因在藥肆自投以羌活湯不效既而某醫付以柴葛木通之劑病愈劇轉進桂附之藥尤覺不安至第五日延余診之其脈澀滯時築築然身困倦似熱不熱頭眩重似痛不痛欲食而食不能多欲臥而臥不得穩舉步欲跌不要人扶開口欲言微覺舌強如狂如躁不盡狂燥舌上布滿厚苔中有一條黃色似作渴狀類似醉者余擬此證當因太陽高表膻中陽氣被郁太陰近里脾經陰氣不宣前進諸劑失於啓發是以不效因用淡豆豉以發太陽被郁之表草蔻仁以奪太陰不宣之裡半夏和其陰陽厚朴寬其實滿橘紅桔梗開壅消痰香附菖蒲破竅散郁茯苓則安神利濕生薑以匡心去邪囑投此劑應可奏功申刻服之亥刻大汗至次日寅卯而病已如失不藥而起述此一案雙見藥不執方合宜而用然配劑之間又勿過涉奇詫品味要恰情理並見發汗溫中何必定須羌葛桂附而無活法乎李某病瘧月徐甫愈數日路遇風雨夜即沉寐不語某醫授以理中湯一服而效明日某復診之云病已愈只索調理而已付藥二劑只服其一忽然腹脹如鼓痛不可忍小便滴瀝大便如墜不解是夜仍延某醫某至診訖云無救矣不藥而去天明迫余往診其脈關虛尺細而滑詢其前用理中湯極當何以服調理藥反致如此因檢剩劑乃柴胡加木通與麥冬也余擬此證瘧後營衛不固中虛欠補上中之陽不強不能御邪反致邪犯中下覺寐不語者太陰少陰之候也某醫投以理中治法極當乃轉手而付柴胡伊以為先曾病瘧自合和以小柴胡陰已回陽不妨清以通麥指木通麥冬豈知理中所溫者溫在太少指太陰少陰初則對證取效而柴芩通麥不但於足少陽手太陰添一蛇足且於未盡之陰寒復引之而立起凝其土以冰其流故致有腹脹痛大小便之異變也余用五苓散重桂術而加升麻一帖小便通腹痛止大便亦不墜脹矣蓋以二苓澤瀉行其水白朮培土以勝之肉桂溫經化氣併除柴芩通麥之寒升麻則升其冷陷提閘放水水道通而寒氣除中土健而濕自滲也述此一案以見認病自有一定繩墨不是妄自擬度之事某醫前後臨證不但效否懸遠抑且言語徑庭轉手之間生死頓易醫可漫言乎哉薛某食量兼人疊傷酒食患脾胃壅滯之疾凡積朴楂曲萊蔔檳榔消滯之藥無不盡劑且雜以發表疏氣之羌葛香砂等更僕難數半年有餘藥益進病益進臥不能起余診之其脈洪數堅硬身亢熱舌焦黃而齒燥枯驚悸妄言呻吟作渴按及胸膈偏近左脅處痞鞕如盤病家懇服補劑以服消滯藥多而今則臥困若此不得畏蔥也余擬其脾胃本厚脈氣不衰從前之藥只可散其無形安能奪其大聚因用柴胡龍骨牡蠣湯加減出入十餘帖日下穢糞積約一桶痞鞕漸消諸症悉可後以和中之品調理告愈述此一案以見病本可攻而攻之不當以致病家疑畏反欲用補實實之禍恆由於此此處抉破方是眼力方是膽當李某貿於蘇州感證就診於張醫張醫案云濕熱阻滯脾胃不調所用之藥則茯苓木瓜陳皮藿香而已兩服未效仍往就診因其門如市挨候維難坐久忽然暈僕殆濕熱氣蒸久候腹飢所致張醫聞外嘈嘈急出診云證轉厥少指厥陰少陰二經大虛大寒速宜八味丸矣及扶歸服之即刻驚狂譫妄易某診之藥則茯神棗仁黃連緑豆皮連進兩帖狂甚至欲投河復延張醫來診張云證列不治趁速歸里恐四日路程生不待矣是日買舟即行途中且阻風雨七日方得抵家幸而無故余過診時脈息弦滑身熱咽乾漱水不咽小便赤澀腹內微響投以柴芩散一服而身熱退半次日舌苔蒼燥脈近沉數腹滿而作痛楚因授大柴胡湯溏穢黑糞解約盈斗解後漸寧調理即愈述此一案見張醫初則識病只惜用藥輕淺不能奏效繼則懾病勢妄付八味丸而某則徒知是熱不辨何經一味清火豈知黃連緑豆瀉非所瀉及張再診則計無所出此則不以救逆為心而特以支吾為事矣以致病者身纏疾苦囊磐銀錢家外愴惶婦兒悲泣醫者於此未必不有傷於陰駕也一婦胃氣痛醫以薑桂香砂楂曲等治之兩帖奏效病者恐其復痛再索訂方醫者恃其前功如方疊進不料愈服愈痛心膈如割一晝夜昏絶十餘次兩手亂抓咬牙捽首余診其脈散聚不一知因香燥通劑胃氣反傷而脾陰失媾故也但益氣則胃燥反不和陰若養陰則血藥復憂窒膈非得潤而不濡香而不燥者無以善其治也因搗松子仁二兩飲以陰陽水服之一劑痛止人安不啻捷於影響然後調和胃氣以得全可述此一案以見徒據成效不知變成者幾為大害也並見松子奏效要有至理非曰姑試小小機關正可引人入勝也孫某患熱症服於醫柴葛數帖肌熱已解屢索食而禁與焉與致病者胃虛火僭煩亂不寧更進燈心木通銀花澤瀉之劑虛火被逼忽然狂妄驚忤漸至裸體咆哮越野登山嚼吞瓦片譫語不休胡然天帝診之六脈全無但見目紅舌紫雖數人按捺猶難伏也余以大劑六味加麥冬肉桂投之頃時狂燥頓止頃與之粥粥後再進前服次日全安述此一案以見醫無遠見即病之愈與否尚不能知食可進而不進中臟將稿猶自妄投涼瀉致變非常甚可怪也周宅幼女甫二齡患瘧不愈醫曾以小柴胡湯重加首烏服至三十塗劑飲食不進胸腹膨脹左脅瘧塊益大而跳悸不止醫辭不治余診之授以六君子湯加肉桂莪朮木香鱉甲懼不肯服謂莪朮過克肉桂過溫也勉令服之藥竟而愈及來春其女偶感風熱夾濕之症幼科治以荊防清散之藥不效更引水惡咽下利溏黃余過診見幼科之方不為無理即照方付藥兩帖但加赤苓錢許澤瀉數分一服即愈越日周告余曰小女兩次疾病一重一輕兩醫皆不能效先生治瘧之方與小柴胡湯懸隔宜其三服而愈何以昨治風熱不另立方只加苓澤而愈乎余曰令愛證感風熱幼科之藥已對證矣因遺卻利濕是以未效不見惡水利溏非濕病乎加苓澤者正使濕有去路耳周憮然曰不意藥味之別效否大異有如是者醫之為義不亦微乎述此一案以明藥過劑而疾以益增見未到而病有遺治之誤認病者貴眼力清而心思細也舒宅婦熱症燒渴八晝夜未進粒米及更衣指大便後熱退身涼猶不與食越一日身熱汗出手顫頭搖與粥反嘔某醫不悟反付以秦艽川斷萆薢當歸川芎神麯等藥服之即吐更覺沉重奄奄而已余至診之知胃氣大乏急宜谷保夫云聞谷則嘔不下奈何余令置粥數杯坐視徐徐挑灌嘔出旋又灌之灌至第五杯後始咽不吐頃即沉沉睡息舉家愕然無不涕泣良久連聲噫氣呼親而醒因問還食粥否點首應之與之兩盞依然就睡是夜醒即與粥來日不藥諸症霍然述此一案非以示奇乃見生死關頭不須藥力卻在與食不與食矣若不坐視挑灌但以聞谷則嘔而中止之安能五杯方授有來日之霍然乎費母感冒頭痛寒熱適程醫輿從過門因有親誼邀入診之但云風夾食必須靜餓劑則從小柴胡也及服劑徹夜不安胸脅滿悶明日仍用小柴胡加蔞霜二錢服之漸漸沉困至三日程不能主更邀馬姓商酌馬雲小柴胡極妥只蔞霜輕耳因加倍投之第四日便不言語馬程同至愕然又薦汪姓來診汪用二陳楂朴蔞霜五錢迭相稱讚以為所見皆同即令守服三帖第七日病者抓心摜首聲息全無乃馳字來京並寄各醫藥方余度其情知被各醫所困因囑來人迅速回報試以薄粥灌之如可下咽或有生機勿以藥為務也來晨余親赴病家時三醫適才診訖余詢病象如何同曰無救伊等勉酌藥劑所用厚朴霍香陳皮枳殼劑重三錢五分外用黃耆幾片石斛數咀此則無可如何強作支吾意也三醫去後余入診之脈已無有但見兩目如熏舌黑似漆喊叫不聞按胸畏痛二便不通周身烙熱灌以清粥受一二匙因急以附子理中湯枳實茯苓大劑投之一晝夜灌竟四帖按覺六脈稍出如絲第十日夜半時腹內聲響頃即大解黑穢始聲息出有醒意也繼以調理湯藥斟酌進之半月乃愈述此一案見病本太陽而遽用柴胡證未結胸即妄投蔞實仁逆而又逆強病就我不至禍人不止何如勿藥之為中醫也孫宅婦患虛損診至二十餘處服藥三百餘劑病日益甚余診之六脈洪大而虛溢出魚孫大肉枯極發落皮皺氣促咳痰骨蒸汗熱晌午則兩顴遊紅杯粥亦不能下加以抽掣便溏臥床側席彌一月矣病者告余曰病至此已自分必死但是從前錯誤追悔已遲為今之計尚可回生於萬一否余曰爾既自知無庸贅説但能息心靜慮勿令藥劑亂投或者轉禍為福亦未可知乃以炙甘草湯限服十劑清寧膏晚服五匙服至六日諸證仍然反益煩悶其姑欲令中止病者誓以一日不死一日守服及診其脈溢出魚際者退於寸內矣因屬再服服至九帖忽身上颶颶是夜竟得稍寐來晨諸症略輕病者自信益堅專心續服至十有六劑證平大半繼以養榮歸脾參酌為丸每晚服之右歸丸六味丸時或早服調理兩月沉疴盡起迄今八載連生子女有謂怯弱之症九死一生者余於此重有慨焉述此一案以見求速效而惑多岐者非徒無益而又害之也此證直到臨崖方才勒馬幸不遇加鞭者耳馮某第三子年十四自暮春微覺困頓懶食治以建脾清導之劑忽昏然沉睡晝夜迷離叫喚難醒醒惟食粥一盞而已如是逾夏經秋服藥不可勝計九月索診於余其脈數如釜沸余以大劑六味湯投之十二帖六脈始平兩關變有滑象又以溫膽湯投六帖脈變虛莫改授補中湯四帖脈轉弦鞕便間日寒熱與瘧無異因酌逍遙散加鱉甲香附四帖寒熱既痊沉睡忽解亦能飲食矣余擬此證痰熱伏於肝膽藥餌清傷脾胃肝膽之實熱未除脾胃之虛機續見肝膽熱則好眠脾胃虛更懶食矣相火寄於肝膽肝膽受痰熱之困不能宣發相火且相火與痰熱相搏六脈數於釜沸是其診也故首用六味壯水之主以鎮陽光陽光得鎮兩關變滑乃肝膽脾胃現出證之真形故投溫膽湯以平膽熱膽熱平則滑脈去而虛耎來又以補中湯扶中氣而升陰陽脈轉弦鞕者肝膽久郁今得舒其本象也寒熱如瘧者非瘧也乃少陽中正之官開其鎖鑰本氣之陰陽得以往來只為脾胃尚弱未能承應間作寒熱耳治之以逍遙散加鱉甲香附乃以消散余郁滋養肝膽調和脾胃使臟腑攸平土木調達耳是以諸症悉除起沉疴於一旦也述此一案以見見病知源之惟難按脈究理之不易程子曰脈無不真證無不假三指之下毋得受病欺瞞被病恐嚇也許宅婦妊娠八月仲夏日患亢熱燒渴引水不欲咽小便赤澀濕熱之證誤服枳朴消導諸藥一帖胎墮因延産科治之三服芎歸以致悶絶交晝備棺木而化錢紙矣因病者肌表熱甚氣息未了父母放舍不下延余診之六脈芤大無序身直目閉舌青額潮腹滿指逆見證雜沓如此以胎前之熱在陽明至今未解當解肌不解肌熱不能退胎前之濕在太陽至今未利當利水不利水濕不能消産後脈大亟應瀉熱而未可輕瀉則正氣隨亡産後脈芤宜乎補虛而未可驟補防補則瘀熱滋甚且脈之息數無序表裡陰陽業經雜亂欲投劑挽復諸難非易事也余斟酌至再訂桂枝柴胡湯加味投之一劑微汗而愈述此一案以見救逆之際索須自望聞問切中辨認寒熱虛實表裡陰陽邪正上下標本緩急一一布悉
