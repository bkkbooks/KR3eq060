body:
  text: 卷二桂為諸藥先聘通使人手之骨節左右各十八合之為三十六足之骨節左右各十八合之為三十六合計四肢骨節七十二七十二候七十二節天人同具此數也七十二節屬四肢四肢屬脾胃胃為坎坎為月月為戊戊為土土生水水歸海海起潮潮應月月至中秋而愈明潮至中秋而特大桂至中秋而自芳則又何必月中之桂亦何必非月中之桂凡字從肉旁者作月月桂即肉桂肉桂即箘桂箘從囷廩之圓者為囷箘桂其圓如竹箘桂即今之肉桂厚桂也然生髮之機在枝幹故仲祖方中所用俱是桂枝即牡桂也神農本草經云箘桂味辛溫主百病養精神和顏色為諸藥先聘通使先聘通使者取乎圭之義也桂字從圭圭所以通信信為土德故從土何休公羊傳注云月者土地之精也潮以時至而有信桂得中央土嗅之香當月明潮應之秋而桂也飄香則桂之為物可知也月也潮也桂也皆通乎土者也故桂為諸藥先聘通使也坤坎皆土故字皆從土先天圖坎位乎正西邵子以土系之坎而謂水生於土此所以月生於西而潮亦自西而趨東桂亦取乎桂林西土所產也後天圖坤亦位乎西南先後天一理也月之生明惟賴此震之一陽震三生木桂為木也難經謂肝木主色邵子謂木之神不二說文謂桂為百藥之長則桂之主百病養神和顏色也固宜又節者即關節也兩肘兩腋兩髀兩膕皆機關之室周身三百六十五節皆神氣之周行桂助君火之氣使心主之神而出入於機關遊行於骨節故主利手足步履動轉維艱也時醫以桂枝發表禁不敢用自唐宋以後罕有明其旨所以余用桂枝宜其招謗也噫桂枝之屈於不知己也將何時得以大申其用哉龜板馮夢禎快雪堂集載王節齋先生素工醫撫蜀時患蟲病訪知青城山有隱者能治招之不來乃躬造之一宿隱者脈之云此蟲病也問何以致此乃詰其嘗所服藥云素服補陰丸曰是矣其蟲乃龜板所致龜久生之物惟敗板入藥不得已用生解者須酥炙極透應手如粉者良少堅得人之生氣其生氣復續乃為蟲耳此非藥餌所治公自今壽尚可三年猶及生子公遂歸三年生子而卒龜板良藥製法一乖取禍如此以節齋之善醫尚有此失醫可輕言哉按王節齋本草集要云龜乃陰中至陰之物稟北方之氣而生故能補陰血不足又方家以其靈於物故用以補心甚效此說蓋出於丹溪王氏深信丹溪不啻筆之於書自用以取禍如此抑似愚焉然龜板為蟲之說亦難信據而又紫桃軒雜綴所載一事殆與此相類云昔潤州一大老惟喜服食所制補劑中用龜板餌之垂十年頗健朗晚歲忽患蟲膈厭厭就盡乃謁白飛霞飛霞診視良久曰此瘕也公豈餌龜板藥餌耶今滿腹皆龜吾藥能逐之其在骨節膚腠中者非吾藥所能也公可速治後事乃與赤丸數粒服之下龜如菽大者升余得稍寬不數月仍敝易簣時驗小遺悉有細蟲彷彿龜形其得氣而傳化如此可畏哉考龜鱉水魚山瑞鮜等物形狀相類與莧菜同時食之龜鱉皆能復生曾於清明時將鮜與克菜用刀同琢至碎轉瞬悉變小鮜蠕蠕生動矣物理之相生如此不可不慎內結七疝馬元臺云內者腹也腹之中行乃任脈所行之脈路則宜其為病若是難經二十九難云其內苦結男子為七疝女子為瘕聚七疝乃五臟疝及狐疝㿗疝也出於刺逆從篇脈要精微論奇論脈解篇陰陽別論靈邪氣臟腑病形篇等篇再考之內經注吳鶴皋云七疝寒水筋血氣狐㿗也張隱菴注四時刺從篇云七疝者乃總諸病為言如本注所言者六也邪氣臟腑病形篇所言者一也蓋以諸經之疝所屬有七故云七疝若狐㿗沖厥之類亦不過為七疝之別名耳後世如巢氏所敘七疝則曰厥癥寒氣盤肘狼虞庶難經注依巢氏釋氏至張子和非之曰此俗工所立謬名也於是亦立七疝之名曰寒水筋血氣狐㿗吳注本之學者當以經旨為宗余按七疝考經文其目未明顯姑從馬張之義王永輔惠濟方以石血陰氣妒肌疝闢為七疝亦未知何據李中梓醫宗必讀別立七疝之名分㿉與㿗誤甚經驗陽症論陽明症鼻流清涕即寒在陽明寒者陰也氣音陽也陽遇陰則成形陽氣衝開陰氣則無形不流清涕亦不生痰凡陽明症鼻築不通而流清梯者古法用葛根湯治之卻每多不效余治偶病鼻築氣滯流涕者用附片兩薑汁炒生乾薑兩治之即效治久病氣弱鼻築不通者用四味回陽飲蜜泡參炒炮姜薑汁附片炙粉甘草加蜜炙黃耆二兩五錢久服自愈陽症十六字月張不眠聲音響亮口臭氣粗身輕惡熱六經切要凡治病以六經為本分火弱水弱為宗傷寒集註辨陰症陽症十六字心傳最捷最佳經驗陰症論陰症者其人目露眼膛青眼睛睜不開眼皮重眼睛澀耳常鳴鼻常注舌乾不渴睡醒猶甚頭重難抬一身盡重心常跳慮靜坐尤甚欲寐不寐面色青黑無有血色常常有病又似無病反飽作脹飲食不消及生諸蟲四肢無力吐血咳嗽嗆出眼淚氣驟人昏起則欲倒半身不遂麻木不仁暴脫不知人事舌卷耳聾聲音常失腹常陰痛心氣常痛起包起塊心中不安若貓抓之狀莫可名言雖夏天亦常畏寒足膝時刻怕冷手足心燒遺精滑精痔瘡痔漏脫肛便血婦女崩帶以上種種皆陰症病形者也陰症十六字目瞑嗜臥聲低息短少氣懶言身重惡寒看病法凡臉青黑者是陰症臉紅昔是陽症戴陽症者臉亦紅戴陽者陰症似陽也辨舌苔法凡舌苔黃亦有虛火實火之分醫者凡見舌黃即言寒火不分虛實概用芒硝大黃誤人不淺不知實火始用芒硝大黃下之虛火則用回陽理中湯溫之實火舌苔黃者如火炕物太過而生黃色虛者舌苔黃者如物濕壞亦生黃衣平日人強壯大便結燥口渴喜飲冷舌苔黃者方是實火當下用涼藥若平日人無精神四肢無力飲食無味反飽作脹舌苔黃者乃是虛火當燥用熱藥咳嗽印證凡治弱症咳嗽吐血症不必多分總要認定水弱火弱的病源今醫者治此數病多用生血滋陰之藥雖血止而咳生倘用清肺潤肺之藥治之十有九死若不分虛火實火一概用滋陰之藥亦誤人不淺蓋虛火宜熱實火宜涼實火者如柴炭之火以水淋之其火即熄故治實火用涼藥即愈虛火者如濕物之發燒以水淋之其燒可退不將濕物曬乾終久必壞故治虛火用熱藥即愈今之醫虛火者每以涼藥治之其病雖鬆根總未除洽如濕物發燒以水淋退是也余初醫咳病未得其法亦從時醫治之全不見效曾於冬時求治咳嗽者六七人盡是臉青面黑觀前醫所治皆用滋宵水之藥服之多反飽作脹精神全無遺精盜汗胸中不安因將天時印證之如天色黑即是冷人面黑諒總是冷乃用人參黃耆白朮甘草乾薑附片砂仁半夏蔻仁等藥而人人皆愈余以後治病總分水弱火弱氣虛血虛余無別法口臭凡口臭除陽明實火外皆宜服熱藥醫者見口臭即言是火此說無憑火者陽也陽既無聲無臭無形無影有何臭氣臭者弱氣也陰氣也陰則有形有臭故口臭治法亦宜熱不宜涼蟲疾印證又治一蟲症諸醫盡用殺蟲藥治之不效余初用六經中烏梅丸治以殺蟲亦不效乃將地理印證之如水中生蟲火中不生蟲凡物濕朽者生蟲乾燥者不生蟲因以附子理中湯加花椒二錢炒汗去核胡椒三錢紅糖調服久服全愈此亦一法嘔同一嘔也發熱仍惡寒而嘔者屬太陽寒熱往來而嘔者屬少陽不惡寒但惡熱而嘔者屬陽明當分三陽而治之其無寒不熱之嘔則專取諸中焦其有渴甚而嘔者必以飲水多之故嘔甚而渴者必以津液傷之故先渴後嘔先嘔後渴病異而治不同治不必顧忌按治法用藥有奇險駭俗者只要見得病真便可施用不必顧忌即如病有臨危原屬有餘失於攻下所致雖至幾微欲絕猶當攻下取效若久瀉久痢至於滑脫不禁則宜卻止而後調之如國家以刑治好盜以兵卻虜寇不得已而用權權不離經非霸術也王道也乃有醫家謬稱王道一味平補調停此可施於不足不可施於有餘則邪氣得補而愈盛是速其危也比年醇邪病原因肝陽內熾而醫家驟用攻下致陽氣內郁不通繼用滋陰之品反致陰血凝澀而致陽氣更不得通暢矣是以神火不能遊行於關節則手足動履維艱內風鼓動而臍腹脅肋跳動頭暈嘔吐大便秘塞甚至聲瘖嘶啞穀食少進精神氣血俱形羸頓病亟矣群醫束手之際而予診用通調陽氣之藥不十數劑王之病自是漸有轉機矣後因用鹿茸以通督脈之法而我皇太后以鹿茸性熱恐與病有礙傳旨停止蓋自是而醇邪亦便不服他醫之藥矣又有遇危難症如大黃附子迥若霄壤恐致殺人而惟用中和之方無大熱大寒救療而死其殺人一也故張隱菴謂服平和湯而愈者原不死之病服平和湯而後成不救者醫之罪也中風傷寒論中風乃是傷寒中之一證宋以後呼為傷風者是也而金匱中風乃靈素所謂偏枯後世中風之稱仿於此夫傷寒論金匱原是一書而同成仲祖之手理宜無以一中風之名互稱兩種之病然魏志注引曹瞞傳云魏太祖陽敗面喎口叔父怪而問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼太祖太祖口貌如故嵩問曰叔父言汝中風已瘥乎太祖曰初不中風魏武與仲景氏同漢末人知當時有此語又按後漢朱浮與彭寵書伯通獨中風狂走此以狂為中風後世狂風心風等之稱蓋有所由均之東漢語所指遞殊不可不知也若夫後世紫白癜風落架風食迷風之類風字竟不可窮詰焉蓋風善行而數變凡病變動移易不定者以風呼之也耶錄以徯識者以心治心嘗讀養生書每以一心療萬病蓋謂心病則身病七情俱忘六窗俱閉眼耳鼻舌心意元氣渾淪百脈皆暢又何病焉推之治一切心病藥所不及者亦宜設法以心治心弓影蛇杯解鈴繫鈴此固在慧心人與物推移無法之法可意會而不可言傳也勞症不同古人所謂虛勞皆純虛無陽之症其脈極虛芤遲故用桂枝及建中等湯與近日之陰虛火旺吐血咳嗽而脈數者正相反誤治必斃近日吐血咳嗽之病乃是血症有似虛勞其實非虛勞症也傷寒雜病論論按仲祖自序言作傷寒雜病論合十六卷則傷寒雜病未嘗分為兩書也凡條中不貫傷寒者即與雜病同義如太陽之頭項強痛陽明之胃實少陽之口苦咽乾目眩大陰之腹滿吐利少陰之欲寐厥陰之消渴氣上撞心等症是六經之為病不是六經之傷寒乃六經分司諸病之提綱非專為傷寒一症立法也觀五經提綱皆指內症惟太陽提綱為寒邪傷表立因太陽主表其提綱為外感立法故叔和將仲祖之合篇全屬傷寒不知仲祖已自明其書不獨為傷寒設所以太陽篇中先將諸病線索逐條提清比他經更詳也其曰太陽病或已發熱未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒是傷寒另有提綱矣此不特為太陽傷寒之提綱即六經總綱觀仲祖獨於太陽篇別其名曰傷寒曰中風曰中暑曰溫病曰濕痹而他經不復分者則一隅之中可以尋其一貫之理也其他結胸臟結陽結陰結瘀熱發黃熱入血室譫語如狂等症或因傷寒或非傷寒紛壇雜沓之中正可思傷寒雜病合編之旨矣蓋傷寒之外皆雜病病不脫六經故立六經而分司之傷寒之中最多雜病內外夾雜虛實互呈故將傷寒雜病而合參之此握要法也學者於傷寒書熟讀而詳玩之可知其精妙矣膀胱所藏之津液隨太陽之氣運行於膚表猶司天之應泉下天氣之下連於水論經云怯然少氣者是水道不行形氣消索也此言膀胱之津水隨太陽之氣運行於膚皮潤澤於皮毛如水道不行則毛腠夭焦矣靈蘭秘典論曰膀胱者州都之官津液藏焉氣化則能出矣謂膀胱所藏之津液隨太陽氣化而出行於膚表非溲溺也故太陽氣有所阻則水亦結於胸脅矣至於小便通利乃三焦之氣化三焦主決瀆之官也又靈樞口問篇曰液者所以灌濡空竅者也故液竭則精不灌則目無見補天柱經挾頸此言膀胱之津液上濡空竅若液竭於上則目無所見故補太陽經之天柱於挾頸間由此推之則太陽之應司天在泉如天氣之下連於水義可知矣太陽之氣苦天道之運行於地外而復出入於地中論五運行大論曰天垂象地成形七曜緯虛五行麗地地者所以載生成之形類也虛者所以列應天之精氣也地為人之下在太虛之中大氣舉之也此言地居天之中而天道運行於地之外日隨天道環轉故有晝夜之開闔晦明又曰天氣下降氣流於地地氣上升氣騰於天故燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固天氣主司天在泉運行於五運之外而復通於地之中是以有寒暑往來行生長收藏之令夫五臟者地之五行也地之五行化生人之五臟三陰之氣五臟之所生也是以三陽在外三陰在內太陽之氣外行於三陽內行於三陰又靈樞經云太陽主外太陰主內五臟三陰之氣在太陰所主之地中朱夫子曰天之形雖包於地之外而其氣常行於地之中其論是矣太陽應天道而運行於三陰三陽之外論經云太陽者巨陽也為諸陽主氣言陽氣咸歸於太陽也故太陽應天道之居高衛外夫陽因而上衛外者也陽因而上者天體居高而在上衛外者環繞於地之外而太陽氣亦如之著至教云三陽天為業三陽者太陽也謂太陽之功業猶天也故五臟六腑之腧皆歸於太陽通體之內太陽在膚表之第一層六氣在皮腠之第二層故傷寒論中有通體之太陽有分部之太陽通體之太陽猶天分部之太陽猶日所謂陽氣者若天與日之義又肺氣合太陽於皮毛肺屬乾金而主天心氣為陽中之太陽心合君火而主日則太陽天日之義益明矣夫風寒暑濕燥火天之陰陽也三陰三陽上奉之太陽主天之陰陽運行於六氣之外六期環會七日來復是太陽之中有六氣也論標本六氣之化由吾身陰陽之所感百病之生總不出於六氣之化如感風寒暑濕燥火而為病者病天之六氣也病在吾身而吾身中又有六氣之化如中風天之陽邪也病吾身之肌表則為發熱咳嗽在筋骨則為痛痹拘攣在腸胃則為下痢飧泄或為燥結閉癃或直中於內則為霍亂嘔逆或為厥冷陰寒此表裡陰陽之氣化也如或感吾身之陽熱則為病熱感吾身之陰寒則為病寒感吾身之水濕則為痰喘感吾身之燥氣則為便難如中於腑則暴僕而卒不知人中於臟舌即難言而口唾涎沫又如傷寒天之陰邪也或中於陰或中於陽有中於陽而反病寒者有中於陰而反病熱者是吾身之陰中有陽陽中有陰標本陰陽之氣化也如感吾身中之水濕則為青龍湯五苓散之症如感吾身中之燥熱又宜於白虎湯承氣湯諸湯此止受天之一邪而吾身中有表裡陰陽變化之不同也又如夏月之病有手足厥冷而成薑桂參附之症者蓋夏月之陽氣盡發越於外而裡氣本虛受天之風暑而反變為陰寒皆吾身之氣化非暑月之有傷寒也是以神巧之士知標本之病生則知有標本之氣化知標本之氣化則能用標本之治法矣故知標與本用之不殆明知順逆正行無間此之謂也逆者以寒治熱以熱治寒從者以熱治熱以寒治寒如陰陽寒熱之中又有病熱而反寒者如厥深熱亦深之類是也又有病寒而反熱者如揭去衣被欲入水中此孤陽外脫急救以參附之症粗工不知言熱未已寒病復始同氣異形迷診亂經此之謂也傷寒命名仲祖傷寒名書之旨昔人謂六淫之氣寒為首太陽為寒水之經十二經之首寒傷太陽寒水之經故名傷寒按此而論仍未知傷寒名書之本旨也余謂讀傷寒論當求其所以立法之意所以命名之意不審其論之何以名傷寒則何怪人視傷寒書為治傷寒而立論也而不知傷寒書為萬病統領而立論也凡病之為風為寒為溫為熱為濕溫者古皆謂之傷寒乃人知風與寒為傷寒論中病而於溫與熱謂不可用傷寒論中方其意若曰方既出於傷寒論自是治寒方必非治溫法豈有治溫而用治寒方者於是一遇溫熱病無不力闢傷寒方更無人知溫熱之病本隸於傷寒論中而溫熱之方並不在傷寒論外者仲景傷寒論自序云撰用素問九卷八十一難則欲讀傷寒論必先於素問求之素問曰熱病者皆傷寒之類也又曰凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑又難經五十八難曰傷寒有幾答曰傷寒有五有中風有傷寒有濕溫有熱病有溫病傷寒者病之總名也下五者病之分證也傷寒為綱其目則五一曰中風二曰傷寒三曰濕溫四曰熱病五曰溫病明說傷寒有五種焉病既來自傷寒是當從病之來路上立論論即從病之來路上命名故仲景傷寒論之傷寒字即難經傷寒有五之傷寒字非二曰傷寒之傷寒字也學者知命名之意是傷寒書乃治雜病之統書也非專治傷寒之一種書也是為得矣聖經賢論本草靈素聖經也傷寒要略賢論也賢論猶儒者之之四書聖經猶儒者之本經奈千古以來天下之醫只求方技以行術不求經旨以論病仲祖序云不念思求經旨以演其所知各承家技終始順舊舉世昏迷莫能覺悟者是也夫傷寒論雖論傷寒而經脈臟腑陰陽交會之理凡病皆然故內科外科兒科女科皆當讀傷寒書也不明四書者不可以為儒不明傷寒者不可以為醫經云非其人勿授論云傳與賢人甚哉人之不易得也山中宰相按古稱醫士為山中宰相謂能燮理陰陽調和氣味操生殺之柄耳記云醫不三代不服其藥許學士曰謂能讀三代之書予以為世代相傳又能讀書好學猶簪纓世胄士之子而恆為士也若僅守遺方以為世傳何異按圖索驥夫大有四時之氣地有五方之異人之百病變幻多端即如傷寒一症有三百九十七法可膠執遺方能通變時疾乎趙括徒讀父書尚至喪師敗績況無遺書可讀乎守祖父之業而不好學者可方草廬諸葛乎伊川先生曰醫不讀書縱成倉扁終為技術之流非士君子也盧不遠先生曰當三複斯語論醫宗必讀明李士材先生聽著醫書數種內有醫宗必讀一書固已膾炙人口矣然余竊有議焉夫必讀書軒岐之書也越入仲景之書也下此而脈經千金外臺以及近代諸名家書雖不能盡讀或取其十之六七或取其十之三四不可不讀矣苟守長沙博聞強識之訓以探本窮源則是書又為淺醫畫限之書矣改其名曰不必讀其庶幾乎四大家辨李士材讀四大家論一篇本自王節齋大意謂三子補仲景之未備而與仲景並峙也然仲景醫中神聖德備四時三子則伯夷伊尹柳下惠而已試觀玉函金匱方中黃芩白虎已開河間之先也建中理中已開東垣之先復脈黃連阿膠已開丹溪之先也然則謂三子得仲景之一德而引伸條暢之則可謂三子補仲景之未備則未確也張劉朱李仲景立方之主醫中之聖所著傷寒金匱諸書開啟屯蒙學者當奉為金科玉律後起諸賢不可相題並論所謂四大家者乃張子和劉河間李東垣朱丹溪也就四家而論張劉兩家善攻善散即邪去則正安之義但用藥太峻雖有獨到處亦未免有偏勝處學者用其長而化其偏斯為得之李朱兩家一補陽一補陰即正盛則邪退之義各有灼見卓然成家無如後之學者宗東垣則低河丹溪入主出奴膠執成見為可嘆也殊不知相反實以相成前賢並非翻新立異即發熱一證而論仲景謂凡熱病者皆傷寒之類也故有桂枝麻黃等湯以治外感之發熱丹溪則以苦寒治陰虛之發熱各出手眼補前人所未備本隨症治症未嘗混施乃宗東垣者雖遇陰虛發熱亦治以甘溫參耆不已甚而桂附宗丹溪者雖遇陰虛發熱亦治以苦寒參麥不已甚而知柏此尚何異操刃乎非東垣丹溪誤人不善學東垣丹溪者自誤以誤人也吾願世之學者於各家之異處以求其同處則辨證施治悉化成心要歸一是矣庸醫殺人人之死於病者少死於藥者多今行道之人先學利口以此殺人即以此得名是可慨也汗吐下和四法汗吐下和乃治療之四法經曰在上者湧之其高者因而越之故古人治病用吐法者最多朱丹溪曰吐中就有發散之義張子和曰諸汗法古方多有之惟以吐發汗者世罕知之今人醫療惟用汗下和而吐法絕置不用可見時師之缺特補湧吐之治方藥雖簡而法不可廢也若脈浮用四物湯四君子湯引吐又治小便不通亦用吐法是又在用者之圓神矣司天運氣不足憑張悼傷寒兼證析義云諺曰不讀五運六氣檢遍方書何濟所以稍涉醫理者動以司運為務曷知天元紀等篇本非素問原文王氏取陰陽大論補入經中後世以為古聖格言孰敢非之其實無關於醫道也況論中明言時有常位而氣無必然猶諄諄詳論者不過窮究其理而已縱使勝復有常而政分南北四方有高下之殊四序有非時之化百步之內晴雨不同千里之外寒暄各異豈可以一定之法而測非常之變耶治法雜記腰痛屬虛者固多因而風寒痰濕氣阻血凝者亦不少一概蠻補必成痼疾不可不審頭風有偏正之殊其病皆在少陽陽明之絡以毫針刺痛處數穴立效其外有瘡毒入頭名楊梅頭痛此乃外科之症另有治法近人患心胃痛者甚多十人之中必有二三皆系痰飲留於心下久成飲囊發作輕重疏數雖名不同而病因一轍治法以滌飲降氣為主凡病竟有時代之不同如近三十年中咳嗽吐血者十人而五余少時此病絕少亦不可解也按泄瀉乃一時寒暖不調水穀不化或冒暑傷濕等症當擇清淡消散之品一二劑即愈若脾胃虛寒火衰等瀉宜用理中固腎之方隨症酌用可也噎膈有真假之殊真膈病乃胃口枯槁之症百無一治書中論有格脈格症而其形象俱未詳載必臨症多乃能識其真耳傷飲惡飲此乃常理若胸中有水則津液下流反口乾思水但不能多飲耳按關格之症內經傷寒論所指不同內經所云是不治之症傷寒論所云則卒暴之疾當於通便止嘔方法隨宜施治可也肺瘻全屬內症肺癰乃系外科輕者煎藥可愈重者膿血已聚必得清火清毒提膿保肺等藥方能挽回否則不治所以金匱云始萌可救膿成則死也水腫之病千頭萬緒雖在形體而實內連臟腑不但難愈即愈最易復病復即更難再愈所以內經針水病之穴多至百外而調養亦須百日反不若膨脹之症一愈可以不發治此症者非醫者能審定病症神而明之病者非能隨時省察潛心調攝鮮有獲全者水為有形之物故按之即起膚脹為無形之氣故按之不起腸覃乃腸外惡氣所結故月事仍下石瘕乃胞中惡血所凝故月事不行各有定理也至石水則在少腹之中水結不散之症若臌脹則非氣非水臟腑皮肉俱堅腫邪盛正衰難為治矣熱入里則外惡寒清裡熱則惡寒自解然亦須詳審有表無表指表症方為精密況屬汗出多之病無不惡寒者以其惡寒汗出而誤認寒即用熱劑則立危矣今世痰飲之症十居三四患之者無不胃疼嘔逆乃普天下醫家無人能知之者人立一說治無一效言之慨然諸病之中惟咳嗽之病因各殊而最難愈治之稍誤即貽害無窮余以此症考求十餘年而後稍能措手故集中所載之方至靈至驗學者當潛心參究治之自有得心應手之妙勿輕視也金匱等書治疽病之方最多然用之或效或不效非若他症之每發必中者何也蓋疸之重者有囊在腹中包裹黃水藥不能入非決破其囊或提其黃水出淨必不除根此等病當求屢試屢效和平輕淡之單方治之專恃古方竟有全然不應者藥治雜記一藥之用或取其氣或取其味或取其色或取其形或取其質或取其性或取其所生之時或取其所成之地各以其所偏勝而即資之療疾故能補偏救弊調和臟腑深求其理可自得之一病各有所因治病者必審其因而治之所謂求其本也如同一寒熱也有外感之寒熱有內傷之寒熱有雜病之寒熱其治法只有不同時醫見本草有治寒熱之語遂以治凡病之寒熱非惟不效而且有害自宋以來往往蹈此病皆本草不講之故耳內經云五臟六腑之精皆上注於目故目雖屬肝之竅而白乃肺之精也五行之中火能舒光照物而不能鑑物惟金之明乃能鑑物時醫每治人之目疾火以苦寒虛以滋陰而不知火能燭物金能鑑物之理故所治多不效也凡物之生於天地間氣性何如則入於人身其奏效亦如之蓋人者得天地之和氣以生其氣血之性肖乎天地故以物性之偏者投之而亦無不應者余可類推五味各有所屬甘味屬土然土實無味也故洪範論五行之味潤下作咸炎上作苦曲直作酸從革作辛皆即其物言之惟於土則曰稼穡作甘不指土而指土之所生者可知土本無味也無味即為淡淡者五味之所從出即土之正味也故味之淡者皆屬土凡藥之質輕而氣盛者皆屬風藥以風即天地之氣也但風之中人各有經絡而藥之受氣於天地亦各有專能故所治各不同於形質氣味細察而詳分之必有一定之理也人身有氣中之陽有血中之陽氣中之陽走而不守血中之陽守而不走凡藥之氣勝者往往補氣中之陽質勝者往往補血中之陽如附子暖血肉桂暖氣一定之理也然氣之陽勝則能動血血之陽勝則能益氣又相因之理也桂氣分藥也而其驗則見於血其義不曉然乎人之生理謂之仁仁藏於心物之生機在於實故實亦謂之仁凡草木之仁皆能養心以類相應也凡人邪氣鬱結津液不行則為痰為飲痰濃稠為火之所結飲清稀為水之所停故治痰則咸以降之治飲則淡以利之若投以重劑反拒而不相人醫者不可以不知也人身五行金衰則為火所侮有餘之火不能歸藏其宅必犯肺與大腸得清肅之氣以助之則火不能傷而自歸其宅不治火而火自退從此本之治醫之良法也血在經絡之中流行不息故凡用行血補血之藥入湯劑者為多入丸散者絕少故古人治病不但方不能苟即法亦不可易也地黃飲子按中風有真中類中之分此治少陰氣厥之方所謂類中風也故全屬補腎之藥庸醫不察竟以之治一切中風之症輕則永無愈期甚則益其病而致死醫家病家不悟殊堪憫側小續命湯按續命湯為中風之主方因症加減變化由人而總不能捨此以立法後人不知此義人自為說流弊無窮而中風一症遂十不愈一矣半夏附子時醫以半夏附子墜胎不用乾薑亦疑其熱而罕用之而不知附子補命門之火以舉胎半夏和胃氣以安胎乾薑暖土臟使胎易長俗子不知生化湯時醫相傳生化湯加減治產後百病若非由於停瘀而誤用之則外邪反入於血室中氣反因以受傷危症蜂起矣可不慎乎補中益氣湯按東垣之方一概以升提中氣為主如果中氣下陷者最為合度若氣高而喘則非升柴所宜學者不可誤用也歸脾湯按補脾有二法一補心以生脾血一補腎以壯脾氣此方乃心脾同治之法補後天以生血即所以調經煎藥法則湯劑每一兩用水二甌為準多則加少則減之如劑多水少則藥味不出劑少水多又煎耗藥力也凡煎藥並忌銅鐵器宜用銀器或瓦罐砂鍋洗淨封固令小心看守腦識火候不可太過不及火用木炭為佳其水須新汲味甘者流水井水沸湯等各宜方若發汗藥必用緊火熱服攻下藥亦用緊火煎熟下硝黃指芒硝大黃再煎溫服補中藥宜慢火溫服陰寒急病亦宜緊火急煎服之又有陰寒煩躁及暑月伏陰在內者宜水中浸冷服內經治法按內經治病之法針灸為本而佐之以貶石熨浴引導按摩酒醴等法病各有宜缺一不可蓋服藥之功入腸胃而氣四達未嘗不能行於臟腑經絡若邪在筋骨肌肉之中則屬有形藥之氣味不能奏功也故必用針灸等法即從病之所在調其血氣逐其風寒為實而可據也況即以服論止用湯劑亦不能盡病蓋湯者蕩也其行速其質輕其力易過而不留惟病在營衛腸胃者其效更速其餘諸病有宜丸宜散宜膏者必醫者預備以待一時急用視其病之所在而委曲施治則病無遁形故天下無難治之病而所投輒有神效扁鵲倉公所謂禁方者是也若今之醫只以一煎方為治惟病後調理則用滋補丸散盡廢聖人之良法即使用藥不誤而與病不相入則終難取效故扁鵲云人之所患患病多醫之所患患道少近日病變愈多而醫之之道愈少此痼疾之所以日多也寒嗽用小青龍柯韻伯治咳嗽不論冬夏不拘淺深但是寒嗽俱用小青龍湯多效方中驅風散寒解肌逐水利肺暖腎除痰定喘攘外安內各盡其妙蓋以肺家有沉寒痼冷非麻黃大將不能搗其巢穴群藥安能奏效也予按水飲風寒不外乎小青龍而春秋溫燥咳嗽當以辛涼清解之法如桑皮象貝花粉連翹麥冬沙參橘紅之類以治之不可輕用辛溫是所當知也金匱用小青龍又金匱治痰飲咳嗽不外小青龍湯加減方中諸味皆可去惟細辛乾薑五味不可輕去即面熱如醉加大黃以清胃熱及石膏杏仁之類總不去此三味學者可不深思其故也徐忠可金匱辯注有論醫學入門人之百病不外三因一者外因於天風寒暑濕燥火之六淫是也二者內因於人喜怒憂思悲恐驚之七情及飲食房勞是也不內外因者金刃跌撲蟲獸答杖之所傷是也按傷寒外因也而傷寒經旨風寒暑濕之六氣咸所俱載矣其間分析表裡陰陽寒熱氣血邪正虛實靡不備悉明乎傷寒之道干般病難不出於範圍焉故醫學入門當從傷寒始先難其所難而後易其所易若不明於傷寒之理治療總能有功亦未可以醫名也脈理窮源醫理本屬無窮脈學真實難曉必須潛心參悟始可以有豁然貫通之妙余自棄儒就醫十數年於茲研究諸書並無一字之師惟於脈尤得素靈仲景不傳之秘余之拙集僅就管見所及而言及數條非全豹也讀者不可以因此而便棄置諸脈書於不覽也按脈理源流已詳靈素難經之內仲景著六經證治理法精詳實可統治萬病似可不必再論矣而中有脈症互舉闡發內經未發之義者惟在學者能讀內經仲景書神而明之即可知脈之綱領矣今特拈出緩脈一條以統全身脈症診治之法由此而入手則庶乎可以得脈之巧也舊訣以緩為極平脈餘二十六部為病脈定清緩脈便可定諸病脈精熟緩脈即可以知諸病脈脈之有緩猶權度之有定平星也附緩脈七言律於左按緩和緩也張太素曰應指和緩往來甚勻楊元操曰如春初楊柳舞風之象四時調和百脈通渾涵元氣此身中消融宿疾千般苦保合先天一點紅露顆圓勻宜夜月柳條搖曳趁春風欲求極好為權度緩字醫家第一功按不浮不沉恰在中取不遲不數正好四至欣欣然悠悠然洋洋然從容柔順圓淨分明微於緩者即為微細於緩者即為細虛實長短弦弱滑澀無不皆然至於芤革緊散濡牢洪伏促結動代以緩為權度尤其顯而易見者也候脈古以動數候脈是吃緊語須候五十動乃知五臟缺失今人指到腕骨即云見了夫五十動豈彈指間事耶故學者當診脈問症聽聲觀色斯備四診而無失內經論獨內經論脈有獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病按九候之中有獨見之脈而與他部不同即按其部而知止病之所在也七者之中既言獨疾則主熱既言獨遲則主寒而又言獨寒獨熱者何也必干陰部得沉微遲澀之脈故又言獨寒也必於陽部得洪實滑數之脈敵又曰獨熱也陷下者沉浮而不起者也微妙在脈不可不寨素問語凡虛實之變遷寒熱之消長表裡之進退陰陽之勝復氣機一動無不形之於脈而太陰行氣於三陰陽明行氣於三陽素問語臟病則取之於寸口寸口手太陰之脈在手大指魚際之下腑病則取之於衝陽衝陽足陽明之脈在足次指陷谷之上寸口在手衝陽在足手足之動脈氣原於經絡而神通於臟腑故精幹脈者不飲上池之水而操隔垣之明仲景脈法大含元氣纖入無倫文字隱深義理奧衍較之六經病證更為難解所謂微妙而元通也呂覽有言精而熟之神將告之非神將告之也精而熟之也精熟仲景脈法遊心於虛靜之字動指於沖漠之庭以此測病亦不啻鬼謀而神告也脈氣流行應乎漏刻呼吸有數動靜無差是為平脈一有病作而浮沉遲數大小滑澀諸變生焉乖常失度偏而不和始於毫釐之參差成於度量之懸隔仲景脈法自微而著由始及終精粗悉具洪纖畢陳可謂法全而意備矣而其變化紛壇絕態殊狀總不出此一章中蓋下窮其委而此約其要也脈有宜忌凡病內虛者脈弱為宜洪大則病外感者陽脈為宜陰脈則忌有神者吉和緩者吉合於時令者吉與面上五色中見那一色相生者吉反是者凶只此數語可遵其餘皆不經之言不可信也脈貴有神按無病之脈不求神而神在緩即為有神也方書以有力訓之豈知有力未必遂為有神而有神正不定在有力精熟緩字自知所別裁微細叔和釋脈云細極謂之微夫不知微者薄也屬陽氣虛細者小也屬陰血虛也薄者未必小小者未必薄也蓋營行脈中陰血虛則實其中者少脈故小衛行脈外陽氣虛則約守外者怯故薄況前人用微字多取薄字意試問微云淡河漢薄乎細乎故傷寒論少陰論中脈微欲絕用通脈四逆主治回陽之劑也厥陰脈細欲用當歸四逆主治補血之劑也兩脈陰陽各異豈堪混釋有胃氣者生按四時之脈和緩為宗緩即為有胃氣也萬物皆生於土久病六脈中稍帶一緩字是為有胃氣其生可預卜耳診脈切診之道貴於精誠嫌其擾亂故必虛心而無他想身靜而不言動復後可以察脈之微而不失病情也若躁動不安瞻視不定輕言談笑亂說是非不惟不能得脈中之巧適足為傍觀者鄙且笑也督脈起於少腹楊玄操注二十八難督之為言都也是人陽脈之督綱李時珍云督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海張隱菴云少腹小腹也余按莊子養生主緣督以為經釋艾李頤云督中也朱子云督舊以為中蓋人身有督脈循脊之中貫徹上下又上至顛下至尾閭人之陽氣虛則頭目不清大便秘澀見醫書再衣背當中之縫亦謂之督見深衣注皆中意也考督又作𧝴裻劉熙釋名曰自臍以下曰水腹水溝所聚也又曰少腹少小也比於臍上為小也太平御覽云腹下傍曰少腹御覽之說非也詹王論脈詹東圖明辨類函云醫者之審病曰望曰聞以及曰問曰切蓋以切脈驗之望問也先審之有形聲以終審之無形聲內外本末具知之矣脈之有浮沉弦數固矣然浮沉弦數之中其端各又至煩苟非問以證聞以證望原始要終以求其是既參又伍以求其當脈之所指冥冥雖求必失之矣古人置切脈於望問之終非謂其症斷盡於脈耶而脈之不可無望聞問審矣又云切脈而斷之不差者所恃先有望也聞也問也予謂問尤急焉欲得其身之所疾病與疾之所自始詳在問也今之醫者自負其明故不問而切脈一以脈斷即病者欲以其故告訑訑音讀夷意為自滿的樣子然曰我切得之矣無煩言也如斯而得一當且為不免為幸中萬一失之如病者何故醫而自恃不求細詳最為大病人命死生在茲可以輕試而漫投也王兆云湖海搜奇亦云脈理吾惑焉蓋自太史公作史記已言扁鵲飲上池水三十日能隔垣視見人五臟特以診脈為名則其意固可知矣今以兩指按人之三部遂定其為某腑某臟之受病分晰七表八里九道毫毛無爽此不但世少其人雖古亦難也世不過彼此相欺耳二氏之論宜為診家之正眼矣畏惡反辨藥之相須相使相惡相反出北齊徐之才藥對非上古之論也聿考傷寒金匱千金諸方相畏相反者多並用有云相畏者如將之畏帥勇往直前不敢退卻相反者彼此相忌能各立其功圓機之士又何必膠執於世襲之固陋乎李士材意治李中梓字士材有文名並精醫理名重一時金壇王肯堂字泰亦精岐黃術年八十患脾泄群醫咸以年高體衰輒投滋補病愈劇乃延李診視診畢語王曰公體肥多痰愈補則愈滯當用迅利藥盪滌之能勿疑乎王曰當世知醫惟我二人君定方我服藥又何疑遂用巴豆霜下痰涎數升痰頓愈魯藩某病寒時方盛暑寢門重閉床施氈帷貂被三重而猶呼冷李往診之曰此伏熱也古有冷水灌頂法今姑變通用之乃以石膏三斤濃煎作三次服一服去貂被再服去貂帳服三次而盡去外圍體蒸蒸流汗遂呼進粥病若失矣其醫之神效類如此特素自矜貴非富貴家不能致也徐何辨症蘇城今蘇州徐秉楠青浦今屬上海何書田皆精軒岐術名噪一時時金閶劉氏饒於財而僅有一子春患傷寒勢已危群醫束手遂以重金延二人徐至診視久之曰傷寒為百病長死生繫於數日之內苟識病不真用藥不當則變異立見古有七日不服藥之說非謂傷寒不可服藥謂藥不可輕試也若見之未審寧不用藥豈可妄投以速其殆故醫者必先辨六經之形症切其脈理察其病情究其病之所在而後施治如太陽陽明表症也宜汗之少陽則半表半裡宜和解之太陰邪入於裡少陰入里尤深均宜下之若手足厥冷自汗亡陽者又宜溫之至厥陰病則寒邪固結非投大熱之劑不能除此等症勢雖危但能對病用藥始終無誤不難治也今診少君之症為兩感傷寒兩感者如太陽受之即與少陰俱病以一臟一腑同受其邪表症里症一齊舉發兩邪相迫陰陽皆病救表則里益熾救里則表益急譬之外寇方張而生內亂未有不覆其國者察其形症變在旦夕雖和緩上古醫者復生能措手乎言未已閽人守門者報何先生至徐退入夾室何入診之曰冬傷於寒而春病溫蓋寒必從熱化今身反不熱而脈形潛伏此熱邪深陷勢將內閉矣頃按脈時曾於沉伏中求之左右尺寸得弦右則微緩見症耳聾脅痛寒熱若有若無兼之中滿囊縮時或身冷如冰夫脈弦而耳聾脅痛者病在少陽蓋脈循於脅絡於耳也中滿囊縮右脈微緩者病在厥陰蓋脈循陰器而絡於肝也邪入陰分既深故身冷如冰耳辨其形症是少陽厥陰俱病也古人治少陽症謂用承氣湯下之反陷太陽之邪麻黃汗之更助裡熱之勢故立大柴胡湯一方解表攻裡兩得其宜今齒枯舌短陰液已竭若投柴胡承氣解表峻下之劑則更劫其陰是速其殆也若以厥陰論治而進桂附等回陽之品是抱薪救火耳若以石膏黃連苦寒之藥非惟不能撥動其邪正助其冰擱之勢然醫家必於絕處求生方切脈時兩手雖奄奄欲絕而陽明胃脈一線尚存因思得一線之脈即有一線之機反復研求惟有輕可去實一法以輕清之品或可宣其肺氣冀得津液來復神志略清可再圖別策勉擬一方服之於寅卯之交有微汗則可望生機否則勢無及矣是時徐獨坐室中使僕往探索方觀之乃大笑曰是方能愈是病耶果然可將我招牌去終身不談醫道矣言為何僕竊聞達於主何謂劉曰聞徐先生亦在此甚菩今晚雖不及相見明日立方必與共商千萬為我留徐何舟泊河沿遂下宿徐欲辭歸劉苦留之服藥後至四鼓古之以鼓報時果得汗形色略安天未明何至復診喜形於色曰尺脈已起可望生矣但必留徐先生余為郎君療此病徐若去余亦去耳劉唯唯徐悉病有轉機無以自容急欲辭歸劉曰何曾有言先生去彼必不留兒命懸於先生惟先生憐之雖日費千金亦不吝徐聞知前言之失默然無語何一日登岸數次不數日病者已起坐進粥乃謂劉曰今病已愈我返掉掉舟之謂也徐先生已屈留多日諒已欲歸但前有招牌一說或余便道往取或彼自行送來乞代一詢徐遂乞劉周旋劉設席相勸至為屈膝始得解何歸適侄某亦患傷寒病劇舉家惶惶何診之形症與劉似曰易耳遂以前法一劑不應再進而氣絕矣何爽然曰今日始知死生在命非藥之功醫之能也因函致徐自陳其事而請罪焉由是閉門謝客不言醫者數年藥徵書曰若藥不瞑眩厥疾弗瘳周官曰醫師掌醫之政令聚毒藥以供醫事由是觀之藥毒也而病毒也藥毒而攻病毒所以瞑眩也自後世道家之說混於疾醫以藥為補氣養生之物不知其為逐邪驅病之設也可謂失其本矣甚至諸家本草所說藥能尤多謬妄不經蓋藥性惟一也其能亦惟一也若如本草所云功能之多誠有未敢盡信余讀傷寒書而知一方有一方之妙用一藥有一藥之功能是以特就長沙方中核其功能擇錄數十種以為徵信俾學者於臨病用藥之際不致誤於本草句下也可知經方中無一味虛設之藥一藥中無許多泛治之能暨旁治者亦非藥之本性讀傷寒方者即知其梗概也余也篤信好古因用仲景之方而知其用藥之義各有專能去取其例甚嚴並無絲毫假借之藥誠上古之聖方也亦真知藥之功能也醫者取之以療疾無有不愈者但人不肯讀傷寒書或讀之而不求甚解是以不知經方之妙藥性之能也無怪世之醫者治療寡效動多貽誤也可慨也矣校者按自石膏以下至牡蠣諸條為日人吉益東洞藥徵已收者石膏主治煩渴也旁治譫語煩躁身熱滑石主治小便不利也旁治渴也芒硝主軟堅也故能治心下痞堅心下石鞕小腹急結結胸燥屎大便鞕而旁治宿食腹滿小腹腫痞等諸般難解之毒也甘草主治急迫也故治裡急急痛攣急而旁治厥冷燥躁沖逆等諸般急迫之毒也人參主治心下痞堅痞鞕支結也旁治不食嘔吐喜唾心痛腹痛煩悸桔梗主治濁唾腫膿也旁治咽喉痛白術主利水也故能治小便自利不利旁治身煩疼痰飲失精眩冒下利喜唾桂枝附子去桂加朮湯證曰小便自利桂枝去桂加苓朮湯證曰小便不利白頭翁主治熱利下重也黃連主治心中煩悸也旁治心下痞吐下腹中痛黃芩主治心下痞也旁治胸脅滿嘔吐下利也柴胡主治胸脅苦滿也旁治寒熱往來腹中痛脅下痞鞕貝母主治胸膈鬱結痰飲也細辛主治宿飲停水也故治水氣在心下而咳滿或上逆或脅痛芍藥主治結實而拘攣也旁治腹痛頭痛身體不仁疼痛腹滿咳逆下利腫膿茵陳主治發黃也麻黃主治喘咳水氣也旁治惡風惡寒無汗身疼骨節痛一身黃腫地黃主治血證及水病也葶藶主治水病也旁治肺癰結胸大黃主通利結毒也故能治胸滿腹滿腹痛及便閉小便不利旁治發黃瘀血腫膿大戟主利水也旁治掣痛咳煩甘遂主利水也旁治掣痛咳煩短氣小便難心下滿當歸芎藭本草以當歸芎藭治血為產後要藥為則按仲景氏治血方中無此二藥者多而治他證之方中亦有此二藥如奔豚湯當歸羊肉湯酸棗仁湯是也由是觀之不可概為治血之藥也牡丹皮仲景之方中桂枝茯苓丸八味丸大黃牡丹皮湯以上三方雖有牡丹皮而不以為主藥也如此之類皆從其全方之主治而用之如徵姑闕焉以俟後之君子也附子主逐水也故能治惡寒身體四肢及骨節疼痛或沉重或不仁或厥冷而旁治腹痛失精下利半夏主治痰飲嘔吐也旁治心痛逆滿咽中痛咳悸腹中雷鳴芫花主逐水也旁治咳掣痛五味子主治咳而冒者也栝蔞實主治胸痹也旁治痰飲葛根主治項背強也旁治喘而汗出防己主治水也香豉主治心中懊憹也旁治心中結痛及心中滿而煩也澤瀉主治小便不利冒眩也旁治渴薏苡仁主治浮腫也薤白主治心胸痛而喘息咳唾也旁治背痛心中痞乾薑主治結滯水毒也旁治嘔吐咳下利厥冷煩躁腹痛胸痛腰痛杏仁主治胸間停水也故治喘咳而旁治短氣結胸心痛形體浮腫大棗主治攣引強急也旁治咳嗽奔豚煩躁身疼脅痛腹中痛橘皮主治呃逆也旁治胸痹停痰吳茱萸主治嘔而胸滿也瓜蒂主治胸中有毒欲吐而不吐也桂枝主治沖逆也旁治奔豚頭痛發熱惡風汗出身痛厚朴主治胸腹脹滿也旁治腹痛枳實主治結實之毒也旁治胸滿胸痹腹滿腹痛梔子主治心煩也旁治發黃酸棗仁主治胸膈煩躁不能眠也茯苓主治悸及肉瞤筋惕也旁治小便不利頭眩煩躁豬苓主治渴而小便不利也水蛭主治血證也龍骨主治臍下動也旁治煩驚失精牡蠣主治胸腹之動也旁治驚狂煩躁赤石脂主治水毒下利故兼治便膿血校者按自此赤石脂條以下至阿膠條為日本村井杶藥徵續編所載栝蔞根主治渴蜀漆主治胸腹及臍下動劇者故兼治驚狂火逆瘧疾生薑主治嘔故兼治乾嘔噫噦逆桃仁主治瘀血少腹滿痛故兼治腸癰及婦人經水不利巴豆主治心腹胸膈之毒故兼治心腹卒痛脹滿吐膿蜜主治結毒急痛兼助諸藥之毒䗪蟲主治乾血故兼治少腹滿痛及婦人經水不利虻蟲主治瘀血少腹鞕滿兼治發狂瘀熱喜忘及婦人經水不利阿膠主治諸血證故兼治心煩不得眠者膠飴其功有似甘草及蜜故能緩諸急按以下二味為徐氏所增知母主治煩熱以上六十三品皆據經方中擇其性之功能而有徵者盡錄之其餘一二方劑但使用之故無所取其徵者如粳米之於白虎湯附子粳米湯竹葉石膏湯麥門冬湯桃花湯證也小麥之於甘草小麥大棗湯證也赤小豆之於瓜蒂散證也膠飴之於大小建中湯二證也雞子白之於苦酒湯證也礬石之於礬石丸消石礬石散礬石湯三證也土瓜根之於土瓜根散證也干蘇葉之於半夏厚朴湯證也瓜子瓜瓣之於大黃牡丹皮湯葦莖湯二證也皂莢之於皂莢丸桂枝去芍藥加皂莢湯二證也蜀椒之於大建中湯證也秦皮之於白頭翁湯柏皮白頭翁湯二證方也山茱萸薯蕷之於八味丸證也是皆日用試效者也然只在於成方妙用而已不必在於取其一味之功用何如故無所取其徵者但粳米之於方也凡七首此物之於民食也其功最大而其治病之功亦多而本草不載者何哉惟陶弘景本草別錄始載粳米治病之功曰益氣止煩止渴止泄不過此四功也蓋仲景之用粳米也白虎湯三方證曰大煩渴或曰舌上乾燥而煩欲飲水數升或曰口燥渴或曰渴欲飲水口乾舌燥或曰熱骨節疼煩竹葉石膏湯證曰逆欲吐麥門冬湯證曰大逆上氣大逆者上逆也上逆則必煩渴煩渴則舌上必乾燥是粳米有止煩止渴之功也桃花湯證曰下利又曰下利不止附子粳米湯又能治腹痛下利是粳米有止泄之功也故陶弘景嘗見此數方之證以為粳米止煩止渴止泄也益氣者是其家言家言指道家非疾醫之事矣近世稱古方家者以為民生常食之物安能治此病毒乎是未知粳米之功取徵於此七方也夫粳米若作穀食則實為氓民生命若作藥物則又為治病大材猶生薑大棗作為菜果則足以養性作藥物則大有力於治病毒也雖然仲景之用粳米也其主治有來可悉知者惟存而不論亦可也時後方有粳米一味治卒腹痛之方又附子粳米湯之治腹中雷鳴切痛桃花湯之治下利腹痛由此觀之似亦偏取粳米之功矣亦猶小麥之治急也此外方藥俟他日再為考徵焉醫藥箴言一醫門之志分為兩等一曰活人一曰獲利此趨向之端也可勿慎諸一不悟長沙之旨不讀劉李諸家之書而部書自足偏尚可知雖曰活人苦無活法未博而約一隅之見耳一讀方書須不能多必求其熟熟則自然生巧從未見巧從生手出者一古人著書心極天人後人字字究心才是體貼古人處才是自己長進處一有學識而無人知我之運塞彼之緣淺無學識而有人知眾之見短醫之幸長一病涉疑難醫無真見亟當卻之勿誤其事若強不知以為知便是病人一副毒藥一寒熱虛實在平日辨之有素補瀉溫涼須臨症用之得宜不辨而用賊人多矣一古方原足治病然施之有愈有不愈者非方之不善乃病貌同而病因異也故醫者要會認病不可執方一當用之藥不可失時若曾看得分明而復猶豫不決以致病日益進藥且無及是誰之咎歟一病現敗象或因誤治致逆設若再誤是既入井而又下之以石可不審之又審乎一若治一病或致失手雖病家容或不言而自咎奚可輕貸且必今後留神深鑑前轍若治病已極盡心或病者變生叵測而詆滴不免頻聞固是在我無愧莫溫人言一有獨斷之明膽大不為妄大執一隅之見心粗的是真粗要於塞通通塞之中勘出通通塞塞心粗者鮮得其情不教虛實實虛之候誤施實實虛虛膽大者貴嚴其法一無卓識不可以為醫失厚道曷足以濟世卓識自然燭理厚道則不沽名二者兼之便不愧軒岐子弟矣掐佞見長者卓識何在僥倖為功者厚道奚存一轔轔車馬之醫未必非裝腔作勢寂寂蓬茆之士或竟可濟困扶危延醫者不以冷暖動情患病者定應吉凶各別一病者望醫如待仙佛醫者救病如降甘霖現在得度法也醫家若肯早臨病家必不見怪嘗有句云病者求醫似望仙醫人切莫故遲延不徒舉室愴惶甚床簧呻吟最可憐一醫者治病不至誠無以察病之根源病家延醫不至誠不能感醫之諄切語云誠無不格良有以也醫者病者均熟思之一信醫者當信於平日勿信於暫時平日之所信我在清靜局邊冷眼看得分明暫時之所信我落倥傯隊里旁聽反滋疑惑一憫疾苦而薦醫若知醫不確婆心不是仁心信紕謬而服藥徒以藥撞緣執見並非燭見病人禍福之機未嘗不倚伏在此一人有富貴貧賤病無彼此親疏醫當一例診之不失心存普濟嘗見重富貴而畏惠者補恐不宜攻防太峻藥失用當之機致成敗症又輕貧賤而驕做者朝來厭早暮請嫌遲懶應無錢之召無意救人斯二者豈獨交相有失其如方寸方寸心也一良心云何佛經曰一切世界俱為平等可為醫家作如是觀一富者病一年裕一年的調理勤一年的服伺貧人病一日損一日的工傭添一日的債負醫者但加意於有餘不垂憐於不足難言濟世直是忍人一富家之病輕而致重者重在著忙中無主而妄劑雜投初則藥不合病繼則藥難治病可不慨哉貧家之病凶而轉吉者吉在措力不能而平心以俟既然病不亂醫自然病不添病洵有道也一病深藥淺力未能療勿疑而中止病淺藥深反生他變當法以治之斟酌其間豈草率從事者乎一表散之藥煎宜小熟調和之藥煎宜中熟補益之藥煎宜透熟乃取其汁味與病相當耳病家每不知此是在醫者囑令如法也一引經報使藥引所由稱也藥引用多必紊亂乎君臣藥引好奇恐不恰乎宣導既多又奇使人隱僻難求奔馳莫購何曾有益病人無非妄市能事光明之士必不為之一私闢單方及草頭方子服之亦嘗愈病但有不愈者不惟不愈且益變是乃見似為真妄擬妄逞輕信輕試之誤也願有識者達而嘗之則效否有理可評授受無詭幻之設矣一考正穴道以施針刺軒岐奧妙達者有幾可托手於村婆市媼者多為客忤驚痧偶然奏效遂致痞疳瘛瘲恆受其殃明眼者當不被若輩模糊也一天時盦郁攪亂脾胃陰陽證名霍亂不得吐利者飲以鹽湯引之作吐亦因而越之之義也每見證非霍亂輒飲鹽湯吐則傷中不吐則涎胃且變膈中脹滿投谷反悶等證夫微水尚有此禁況醫藥之大誤乎一風熱幹人亦微惡風寒所謂几几者是也病家誤以為寒重從而加衣覆被蓋大人變為燥渴小兒變為驚忤醫當指明習弊以開悟之夫渴者熱也驚者風也熱極生風理必然耳何世習比比然乎一病人久餓身似潮熱得食反吐而脈細微執雲表未盡故發熱表有滯故作吐更從而表散消導之使病枵腹告窮不虛汗眩冒則熱嘔益甚非大誤乎此際粥米救之捷於藥劑一糖性每熱冰糖並不生津勿因其名之美使病者不時噙之既燥舌又滋熱也一食不爽口以茶泡而導之亦細故也久久如此每令人噎且致作吐干食全不下矣故君子不可不防其微也一治病委之醫家養病卻在自己養之不善勿盡謂醫之不善也人在病中惟宜靜息每怪問候者相率嗅鬧使病人免力應答得不損氣耗神乎問候者均宜諒之用藥分量法則附慎用辛熱苦寒古方自靈素至千金外臺所集漢晉宋齊諸名方凡云一兩者以今之七分六釐准之凡云一升者以今之六勺七抄抄古量名十撮為一抄漢書律曆志上量多少者不失圭撮按六十四黍為圭四圭為撮准之此說本諸傷寒論注吳醫匯講亦備載之蓋醫之用藥求其中竅不在多也但撥之使轉即行所無事矣順者生逆者死不貴其藥之重而貴其效之速也藥必有毒非毒無以馭病非節制無以馭毒故藥之分量不可不慎也余在京中見同道之有用大劑治病者每閱其方中至熱之姜附亦不過四五錢至寒之芩連亦不過三四錢皆以北方之氣稟醇厚雖用藥偏重尚不至有傷胃氣近見嶺南之行道者用姜附吳萸等大辛熱之品硝黃等大苦寒之物每味用至七八錢甚至兩許未知何所本也查辛熱最傷胃陰苦寒最傷胃氣雖嶺南為溫熱卑濕之地溫藥涼藥在所不忌然大寒大熱之症亦未見如此之甚也病者遭此辣手每至胃傷不能下咽何不幸之甚也蓋人之稟賦不同偏陰偏陽者在所常有偏於陽不足者以調陽氣之藥治之偏於陰不足者以滋陰氣之藥治之其寒熱溫平隨所加減自無偏勝之弊若嶺南溫熱之區人感濕熱之病者居多縱有虛病而辛熱之劑亦當慎用況病之虛由於濕熱傷氣者多由於濕熱傷陰者尤多治病不推其源不按方土不按節候率爾操觚是誠殺人之具也醫家病家皆當知古之分量每兩即今之七分六釐每升即今之六勺七抄斟酌慎用是所厚望焉
