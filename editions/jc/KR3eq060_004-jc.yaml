body:
  text: 卷四治疫要言余到粵以來日與士大夫遊有談及去年春夏之交羊城有溫疫之症病情雖屬不一無不頭痛惡寒發熱或作嘔吐胸腹痛滿等狀而以頸項及四肢發有毒核者為最多症亦最重間有朝發夕死醫治不及等語夫朝發夕死者即上條之邪入包絡也結毒核者即上條之邪入血脈也血脈為邪所中則鬱結不行聚而成毒即溫病條辨之所謂血結斑也宜急服涼血解毒之品並用靈樞針法以瀉出毒血則邪從此解而病自愈若服氣分苦寒之藥冰閉血邪則不可救矣而粵居南方屬火溫病最多即按內經運氣之理推之由同治至今當燥火司天之令凡患時疫者皆屬火毒況南方屬離為文明之地精幹醫者想必不少竟聞有遵李東垣之法專主溫補者又有信江湖散醫指血結為標蛇服食鮮草藥並屈曲兩指向遍身經穴之處盡力籍之謂之捉蛇者夫散醫之捉蛇尚可愈病蓋血脈為邪毒所鬱結一經箝捉則血脈流行病之輕者即時毒消病愈矣若病之重者雖暫時獲效轉瞬仍必告斃以邪已深入不可專恃外治之法也然箝毒一法獲效甚速自必信從者眾仍屬有益無損至若專主溫補者余不知其殺人幾許矣殊不知李東垣之主溫補專為大雪之後勞役飢飽脾胃虛寒而設吳又可之主攻伐專為邪入膜原陽明燥熱而設所以東垣動用參耆又可輒用大黃皆因病立方並無固執成見閱崇禎甲戌篇載治疫一條云大兵之後人民流離元氣餒弱忽值大寒暴雪寒疫之病日見其多類皆面赤發燒口渴神離因以參附而奏效者指不勝屈又談往載崇禎十六年有疙瘩溫羊毛溫等名呼病即亡不留片刻八九兩月疫死數百萬十月間有閩人曉解病由看膝彎後有筋突起紫者無救紅者速刺出血可活至霜雪漸繁勢亦漸殺余謂此疫即前條所云邪盛勢銳直入心包絡內犯心主之證所以呼病即亡危期極速也考嘉興王肱枕蚓庵瑣語及桐鄉陳松濤災荒紀事皆云崇禎十四年大旱十五十六經年亢旱通國奇荒疫病大作據此則其病由暑燥熱毒深入血分可知所以霜雪繁而病勢殺刺筋出血而其人可活也刺筋出血者經云血實宜決之之旨也邪入較淺筋色尚紅速刺出血則血脈鬆動便有活路筋紫則為血脈凝瘀已極縱刺之血亦不出為無救耳此證神色必然昏沉其脈亦必澀滯模糊或促或伏若用藥亦當遵血實宜決之之經旨通利血脈主治必使血脈漸漸鬆動不致內犯心主走死路方為得法近時痧證亦有頃刻告姐者亦有刺舌底黑筋刺兩臂彎筋兩膝彎筋等處出血而愈者但不若談往所載既甚且多為非常之疫癘耳總之治疫之法必須明運氣司天之令方土之冷暖時令之寒燠並人身臟腑之虛實寒熱認症既真則用藥不誤雖夏日陽升陰降之候仍有以臟寒而患寒病者冬日陰升陽降之候仍有以臟熱而發熱者病勢雖多總不外細心認症之一法是在行道者神而明之何起濱跋世之為醫者二曰治生與濟世而已然守身慎疾者不可不知醫仰事俯蓄者尤不可以不知醫豈惟治生濟世云爾哉濱十應童試兩赴棘闈中歲多病無所成就先母又患痼疾醫藥經年卒致不起濱懲前毖後始嘆保身事親皆不可不知醫且知而不精尤不如不知醫也因博覽岐黃諸書於五運六氣臟腑經絡以及病源藥性無不研究考索聽夕靡倦然其理深邃隱微頗難索解濱氾濫於其中者有年終未能由博返約以自信於吾心及我齡臣夫子來粵憫其愚蒙隨時指授凡夫靈樞素問傷寒金匱諸書古人所已言與古人所未言悉洞明奧實如數家珍認症則直揭根源制方則隨機變化蓋非有卓識有定見不能與於斯也講論之暇復出醫粹精言舉以相示濱受而讀之見其粹如美玉尺璧共寶精若兼金百鍊彌光神明其意上之可以事親下之可以保身淺之足以治生大之足以以濟物此書一出人皆知良醫之心苦與庸醫之殺人不啻有霄壤之判則知醫者日多斯見誤於醫者日少庶於世不無所裨益云光緒乙未冬十月六日門人何起濱敬跋
